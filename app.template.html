<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Western Loop">
<meta name="theme-color" content="#23272B">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>The Grand Western Loop — Trip Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --asphalt:#23272B; --asphalt-2:#2E3338; --paper:#FAF8F2; --card:#FFFFFF;
    --ink:#22262A; --ink-soft:#5A6068;
    --sign-green:#00693C; --sign-green-dark:#00552F;
    --interstate-blue:#10437C; --shield-red:#B01E24; --dash-yellow:#F5C518;
    --line:#E2DDD0; --radius:12px;
    --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{font-family:'Public Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;font-size:15px;
       padding-bottom:calc(76px + var(--sab));overscroll-behavior-y:none}
  .display{font-family:'Oswald',system-ui,sans-serif;text-transform:uppercase;letter-spacing:.04em}
  button{font:inherit;border:none;cursor:pointer;background:none}
  a{color:var(--interstate-blue)}

  /* ===== header ===== */
  header{background:var(--asphalt);color:#fff;padding:calc(14px + var(--sat)) 16px 12px;position:sticky;top:0;z-index:30;
         box-shadow:0 2px 8px rgba(0,0,0,.25)}
  .hrow{display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:720px;margin:0 auto}
  .htitle{font-family:'Oswald';font-weight:600;font-size:17px;text-transform:uppercase;letter-spacing:.05em;line-height:1.15}
  .htitle span{color:var(--dash-yellow)}
  .hday{font-family:'Oswald';font-size:12px;letter-spacing:.12em;text-transform:uppercase;background:var(--interstate-blue);
        border:2px solid #fff;border-radius:8px;padding:4px 10px;white-space:nowrap}
  .progress{max-width:720px;margin:10px auto 0;height:8px;background:#3A4046;border-radius:99px;position:relative;overflow:hidden}
  .progress i{position:absolute;left:0;top:0;bottom:0;background:var(--dash-yellow);border-radius:99px;transition:width .4s}
  .progress-label{max-width:720px;margin:5px auto 0;font-size:10.5px;color:#9AA1A8;letter-spacing:.1em;text-transform:uppercase;
                  display:flex;justify-content:space-between}
  .roadline{height:10px;background:var(--asphalt);position:relative}
  .roadline::before{content:"";position:absolute;left:0;right:0;top:50%;height:3px;transform:translateY(-50%);
    background:repeating-linear-gradient(90deg,var(--dash-yellow) 0 26px,transparent 26px 46px)}

  main{max-width:720px;margin:0 auto;padding:14px 14px 30px}

  /* ===== cards / shared ===== */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;
        box-shadow:0 1px 4px rgba(34,38,42,.06);margin-bottom:12px}
  .date-eyebrow{font-family:'Oswald';font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--shield-red);font-weight:600}
  h2.daytitle{font-family:'Oswald';font-size:21px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;margin:2px 0 8px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .chip{font-size:11.5px;font-weight:600;border-radius:5px;padding:2px 9px}
  .chip.drive{background:#EDF4EF;color:var(--sign-green);border:1px solid #CBE0D3}
  .chip.wx{background:#FDF6E1;color:#8A6D00;border:1px solid #F0E2AE}
  .chip.rest{background:#EEF2F8;color:var(--interstate-blue);border:1px solid #D4DFEE}
  .desc{font-size:13.5px;color:#3B4148;margin-bottom:8px}
  .stay{display:flex;justify-content:space-between;gap:10px;align-items:center;border-top:1px dashed var(--line);
        padding-top:9px;margin-top:9px;font-size:13px}
  .stay b{color:var(--ink)}
  .stay .cost{font-family:'Oswald';font-size:14px;color:var(--sign-green);font-weight:600;white-space:nowrap}

  /* ===== hero (next stop) ===== */
  .hero{background:var(--sign-green);color:#fff;border-radius:14px;border:3px solid #fff;outline:2px solid var(--sign-green-dark);
        box-shadow:0 4px 14px rgba(0,0,0,.18);padding:16px;margin-bottom:14px}
  .hero .eyebrow{font-family:'Oswald';font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--dash-yellow)}
  .hero h2{font-family:'Oswald';font-size:24px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;line-height:1.1;margin:4px 0 2px}
  .hero .sub{font-size:13px;color:rgba(255,255,255,.85)}
  .hero .dist{margin-top:8px;font-family:'Oswald';font-size:16px;color:var(--dash-yellow);letter-spacing:.04em}
  .hero .dist small{color:rgba(255,255,255,.75);font-family:'Public Sans';font-size:12px;letter-spacing:0;text-transform:none}
  .hero-btns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:'Oswald';font-size:13.5px;
       letter-spacing:.07em;text-transform:uppercase;font-weight:500;padding:11px 15px;border-radius:9px;text-decoration:none;
       min-height:44px}
  .btn.nav{background:var(--interstate-blue);color:#fff;flex:1 1 auto}
  .btn.nav.g{background:#fff;color:var(--interstate-blue)}
  .btn.arrive{background:var(--dash-yellow);color:#1c1c1c;flex:1 1 100%}
  .btn.ghost{background:transparent;border:2px solid var(--line);color:var(--ink-soft)}
  .btn:active{transform:scale(.98)}
  .hero.done{background:var(--interstate-blue);outline-color:#0A3159}

  .locbar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);margin:0 2px 12px}
  .locbar button{color:var(--interstate-blue);font-weight:600;font-size:12px;text-decoration:underline}
  .locdot{width:8px;height:8px;border-radius:50%;background:#B8BEC5;flex:none}
  .locdot.on{background:#2BA05A;box-shadow:0 0 0 3px rgba(43,160,90,.2)}
  .locdot.err{background:var(--shield-red)}

  /* ===== alerts ===== */
  .alert{background:#FBEBEC;border:1px solid #EBC2C4;border-left:5px solid var(--shield-red);border-radius:10px;
         padding:10px 13px;font-size:13px;margin-bottom:10px}
  .alert b{color:var(--shield-red);font-family:'Oswald';text-transform:uppercase;letter-spacing:.05em;font-size:12.5px}

  /* ===== stops checklist ===== */
  .stop{display:flex;gap:11px;align-items:flex-start;padding:11px 2px;border-bottom:1px solid #F0EDE4}
  .stop:last-child{border-bottom:none}
  .stop input[type=checkbox]{width:22px;height:22px;accent-color:var(--sign-green);flex:none;margin-top:1px}
  .stop .s-main{flex:1;min-width:0}
  .stop .s-name{font-weight:600;font-size:14px}
  .stop .s-note{font-size:12px;color:var(--ink-soft)}
  .stop .s-opt{font-size:10px;font-weight:700;letter-spacing:.08em;color:#8A6D00;background:#FDF6E1;border-radius:4px;padding:1px 6px;
               text-transform:uppercase;vertical-align:2px;margin-left:5px}
  .stop.done .s-name{text-decoration:line-through;color:var(--ink-soft)}
  .stop .s-nav{flex:none;width:40px;height:40px;border-radius:9px;background:var(--interstate-blue);color:#fff;
               display:flex;align-items:center;justify-content:center;text-decoration:none}
  .stop .s-nav svg{width:17px;height:17px}
  .stop .s-dist{flex:none;font-family:'Oswald';font-size:11.5px;color:var(--ink-soft);margin-top:11px;white-space:nowrap}

  .section-label{font-family:'Oswald';font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);
                 margin:16px 4px 8px}
  .daynav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
  .daynav button{font-family:'Oswald';font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--interstate-blue);
                 font-weight:600;padding:8px 12px;border-radius:8px;background:#EEF2F8;border:1px solid #D4DFEE}
  .daynav button:disabled{opacity:.35}
  .daynav .dn-mid{font-family:'Oswald';font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)}
  .back-today{display:block;width:100%;text-align:center;margin:-4px 0 12px;color:var(--shield-red);font-weight:700;font-size:12.5px;
              text-decoration:underline;padding:6px}

  /* ===== route (itinerary) ===== */
  .leg-head{background:var(--sign-green);color:#fff;border-radius:12px;border:3px solid #fff;outline:2px solid var(--sign-green-dark);
            padding:11px 16px;display:flex;justify-content:space-between;align-items:baseline;gap:6px;margin:18px 0 10px;
            box-shadow:0 2px 8px rgba(0,0,0,.12)}
  .leg-head h2{font-family:'Oswald';font-size:16px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .leg-head .dates{font-family:'Oswald';font-size:13px;color:var(--dash-yellow);letter-spacing:.08em}
  .dayrow{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
          padding:12px 14px;margin-bottom:9px;cursor:pointer}
  .dayrow.today{border:2px solid var(--dash-yellow);box-shadow:0 2px 10px rgba(245,197,24,.25)}
  .dayrow.past{opacity:.62}
  .marker{flex:none;width:46px;height:42px;background:var(--interstate-blue);border:2px solid #fff;outline:1.5px solid #0A3159;
          border-radius:8px 8px 13px 13px;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;
          box-shadow:0 2px 5px rgba(0,0,0,.22)}
  .marker small{font-size:7.5px;letter-spacing:.13em;font-weight:700;text-transform:uppercase;color:#BFD3EC}
  .marker b{font-family:'Oswald';font-size:16px;font-weight:600;line-height:1}
  .dayrow.past .marker{background:var(--sign-green);outline-color:var(--sign-green-dark)}
  .dr-main{flex:1;min-width:0}
  .dr-date{font-family:'Oswald';font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--shield-red);font-weight:600}
  .dr-title{font-family:'Oswald';font-size:15.5px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;line-height:1.2}
  .dr-meta{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .dr-check{font-family:'Oswald';font-size:11px;color:var(--sign-green);letter-spacing:.06em}

  /* ===== todos ===== */
  .todo{display:flex;gap:11px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
        padding:13px 14px;margin-bottom:9px}
  .todo input[type=checkbox]{width:22px;height:22px;accent-color:var(--sign-green);flex:none;margin-top:2px}
  .todo .t-title{font-family:'Oswald';font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:.02em}
  .todo .t-due{display:inline-block;font-size:11px;font-weight:700;border-radius:4px;padding:1px 7px;margin:3px 0 4px;
               background:#EEF2F8;color:var(--interstate-blue);letter-spacing:.05em;text-transform:uppercase}
  .todo.overdue .t-due{background:#FBEBEC;color:var(--shield-red)}
  .todo .t-note{font-size:12.5px;color:var(--ink-soft)}
  .todo .t-note a{font-weight:600}
  .todo.done{opacity:.5}
  .todo.done .t-title{text-decoration:line-through}
  .addrow{display:flex;gap:8px;margin:12px 0 4px}
  .addrow input[type=text]{flex:1;border:1px solid var(--line);border-radius:9px;padding:11px 13px;font:inherit;background:#fff}
  .addrow button{background:var(--sign-green);color:#fff;border-radius:9px;padding:0 18px;font-family:'Oswald';
                 text-transform:uppercase;letter-spacing:.06em;font-size:13px}

  /* ===== info ===== */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
  .panel h3{font-family:'Oswald';font-size:16px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{font-family:'Oswald';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);text-align:left;
     padding:6px 6px;border-bottom:2px solid var(--asphalt)}
  td{padding:8px 6px;border-bottom:1px solid var(--line);vertical-align:top}
  td:last-child,th:last-child{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
  tr.total td{font-weight:700;border-bottom:none;border-top:2px solid var(--asphalt);font-family:'Oswald';font-size:13px}
  .tip{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:12.5px;margin-bottom:8px}
  .tip b{font-family:'Oswald';text-transform:uppercase;letter-spacing:.05em;font-size:12px;color:var(--interstate-blue);display:block;margin-bottom:2px}
  textarea{width:100%;min-height:110px;border:1px solid var(--line);border-radius:9px;padding:10px;font:12px ui-monospace,monospace;
           background:#fff;margin-bottom:8px}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap}
  .btn.small{min-height:38px;padding:8px 13px;font-size:12px;background:var(--interstate-blue);color:#fff}
  .btn.small.warn{background:var(--shield-red)}
  .btn.small.plain{background:#EEF2F8;color:var(--interstate-blue);border:1px solid #D4DFEE}
  .fineprint{font-size:11.5px;color:var(--ink-soft);margin-top:8px}

  /* ===== tab bar ===== */
  nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--asphalt);border-top:3px solid var(--dash-yellow);
      display:flex;padding-bottom:var(--sab)}
  nav button{flex:1;color:#9AA1A8;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 7px;
             font-family:'Oswald';font-size:10px;letter-spacing:.14em;text-transform:uppercase;position:relative}
  nav button.active{color:var(--dash-yellow)}
  nav button svg{width:21px;height:21px}
  nav .badge{position:absolute;top:4px;left:calc(50% + 8px);background:var(--shield-red);color:#fff;font-size:9.5px;font-weight:700;
             border-radius:99px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px;
             font-family:'Public Sans';letter-spacing:0}

  .empty{color:var(--ink-soft);font-size:13px;text-align:center;padding:20px 10px}
  .install-hint{background:#EEF2F8;border:1px solid #D4DFEE;border-radius:10px;padding:11px 13px;font-size:12.5px;color:var(--interstate-blue);
                margin-bottom:12px}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <div class="htitle" id="hdr-title">Trip <span>Tracker</span></div>
    <div class="hday display" id="hdr-day"></div>
  </div>
  <div class="progress"><i id="prog-bar" style="width:0%"></i></div>
  <div class="progress-label"><span id="prog-label"></span><span id="prog-pct"></span></div>
</header>
<div class="roadline"></div>

<main id="view"></main>

<nav id="tabs">
  <button data-tab="today"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>Today</button>
  <button data-tab="route"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 15.5A3.5 3.5 0 0 0 7.5 19H17v2l4-3-4-3v2H7.5a1.5 1.5 0 0 1 0-3H16a4 4 0 0 0 0-8H6V4L2 7l4 3V8h10a2 2 0 0 1 0 4H7.5A3.5 3.5 0 0 0 4 15.5z"/></svg>Route</button>
  <button data-tab="todo"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>To-Do<span class="badge" id="todo-badge" hidden></span></button>
  <button data-tab="info"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>Info</button>
</nav>

<script type="application/json" id="trip-data">__TRIP_JSON__</script>
<script>
'use strict';
/* ================= data & state ================= */
const CUSTOM_KEY = 'tt-custom-trip';
function loadTrip(){
  try{
    const c = localStorage.getItem(CUSTOM_KEY);
    if(c){ const t = JSON.parse(c); if(t && t.legs) return t; }
  }catch(e){ console.warn('custom trip unreadable, using default', e); }
  return JSON.parse(document.getElementById('trip-data').textContent);
}
let TRIP = loadTrip();
let DAYS = TRIP.legs.flatMap(l=>l.days);
const SKEY = ()=>'tt-state:'+(TRIP.meta.id||'trip');
let S = {};
try{ S = JSON.parse(localStorage.getItem(SKEY())||'{}'); }catch(e){ S = {}; }
S.stops  = S.stops  || {};   // {"d2s1": true}
S.todos  = S.todos  || {};   // {"t3": true}
S.custom = S.custom || [];   // [{id,title,note}]
const save = ()=>localStorage.setItem(SKEY(), JSON.stringify(S));

let TAB = 'today';
let DAY_OVERRIDE = null;      // day number when browsing, null = follow the date
let POS = null;               // {lat,lng,at}
let LOC_STATE = 'off';        // off | ok | err
let LOC_ERRMSG = '';

/* ================= helpers ================= */
const $ = s=>document.querySelector(s);
const esc = s=>String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const todayISO = ()=>new Date().toLocaleDateString('en-CA');
const fmtDate = iso=>{
  const d = new Date(iso+'T12:00:00');
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
};
const stopKey = (day,i)=>'d'+day.n+'s'+i;

function currentDay(){
  if(DAY_OVERRIDE!=null){ const d = DAYS.find(x=>x.n===DAY_OVERRIDE); if(d) return d; }
  const t = todayISO();
  if(t < DAYS[0].date) return DAYS[0];
  if(t > DAYS[DAYS.length-1].date) return DAYS[DAYS.length-1];
  return DAYS.find(d=>d.date===t) || DAYS.find(d=>d.date>t) || DAYS[DAYS.length-1];
}
function autoDay(){ const o=DAY_OVERRIDE; DAY_OVERRIDE=null; const d=currentDay(); DAY_OVERRIDE=o; return d; }

function nextStop(){
  const start = DAYS.indexOf(autoDay());
  for(let di=start; di<DAYS.length; di++){
    const day = DAYS[di];
    for(let i=0;i<(day.stops||[]).length;i++){
      const st = day.stops[i];
      if(st.optional) continue;
      if(!S.stops[stopKey(day,i)]) return {day, stop:st, i};
    }
  }
  return null;
}

function haversine(a,b){
  const R=6371, rad=x=>x*Math.PI/180;
  const dLat=rad(b.lat-a.lat), dLng=rad(b.lng-a.lng);
  const h=Math.sin(dLat/2)**2 + Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function distLabel(stop){
  if(!POS || stop.lat==null) return '';
  const km = haversine(POS, stop);
  const mi = km*0.621371;
  return (mi>=100?Math.round(mi):mi.toFixed(1))+' mi';
}
function distLabelLong(stop){
  if(!POS || stop.lat==null) return '';
  const km = haversine(POS, stop);
  const mi = km*0.621371;
  return (mi>=100?Math.round(mi):mi.toFixed(1))+' mi ('+(km>=100?Math.round(km):km.toFixed(1))+' km) away';
}

const appleUrl  = st=>'https://maps.apple.com/?daddr='+st.lat+','+st.lng+'&dirflg=d';
const googleUrl = st=>'https://www.google.com/maps/dir/?api=1&destination='+st.lat+'%2C'+st.lng+'&travelmode=driving';

function locate(auto){
  if(!navigator.geolocation){ LOC_STATE='err'; LOC_ERRMSG='No geolocation on this device'; render(); return; }
  navigator.geolocation.getCurrentPosition(p=>{
    POS = {lat:p.coords.latitude, lng:p.coords.longitude, at:Date.now()};
    LOC_STATE='ok'; S.geoOk = true; save(); render();
  }, err=>{
    LOC_STATE='err';
    LOC_ERRMSG = err.code===1 ? 'Location permission denied — enable in Settings' : 'Could not get a fix';
    if(!auto) render();
  }, {enableHighAccuracy:true, maximumAge:120000, timeout:15000});
}

/* ================= progress ================= */
function progress(){
  let total=0, done=0;
  DAYS.forEach(d=>(d.stops||[]).forEach((st,i)=>{ total++; if(S.stops[stopKey(d,i)]) done++; }));
  return {total, done, pct: total? Math.round(done/total*100) : 0};
}
function renderHeader(){
  $('#hdr-title').innerHTML = esc(TRIP.meta.name).replace(/\s(\S+)$/,' <span>$1</span>');
  const ad = autoDay(), t = todayISO();
  let label;
  if(t < TRIP.meta.start) label = 'Starts '+fmtDate(TRIP.meta.start);
  else if(t > TRIP.meta.end) label = 'Trip complete';
  else label = 'Day '+ad.n+' of '+DAYS.length;
  $('#hdr-day').textContent = label;
  const p = progress();
  $('#prog-bar').style.width = p.pct+'%';
  $('#prog-label').textContent = p.done+' / '+p.total+' stops checked';
  $('#prog-pct').textContent = p.pct+'%';
  const od = TRIP.todos.filter(td=>!S.todos[td.id] && td.due && td.due<=t).length;
  const badge = $('#todo-badge');
  badge.hidden = od===0; badge.textContent = od;
}

/* ================= views ================= */
const navSvg = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.7 11.3 12.7 2.3a1 1 0 0 0-1.4 0l-9 9a1 1 0 0 0 0 1.4l9 9a1 1 0 0 0 1.4 0l9-9a1 1 0 0 0 0-1.4zM14 14.5V12h-4v3H8v-4a1 1 0 0 1 1-1h5V7.5l3.5 3.5-3.5 3.5z"/></svg>';

function stopRow(day,i,st){
  const key = stopKey(day,i), done = !!S.stops[key];
  const d = distLabel(st);
  return '<div class="stop'+(done?' done':'')+'">'
    +'<input type="checkbox" data-stop="'+key+'" '+(done?'checked':'')+'>'
    +'<div class="s-main"><div class="s-name">'+esc(st.name)+(st.optional?'<span class="s-opt">optional</span>':'')+'</div>'
    +(st.note?'<div class="s-note">'+esc(st.note)+'</div>':'')+'</div>'
    +(d?'<span class="s-dist">'+d+'</span>':'')
    +(st.lat!=null?'<a class="s-nav" href="'+appleUrl(st)+'" target="_blank" rel="noopener" aria-label="Navigate">'+navSvg+'</a>':'')
    +'</div>';
}

function dayChips(d){
  let h='<div class="chips">';
  if(d.drive) h+='<span class="chip drive">'+esc(d.drive)+'</span>';
  if(d.wx)    h+='<span class="chip wx">'+esc(d.wx)+'</span>';
  if(d.rest)  h+='<span class="chip rest">'+esc(d.rest)+'</span>';
  return h+'</div>';
}

function viewToday(){
  const day = currentDay(), t = todayISO();
  const ns = nextStop();
  let h = '';

  // location bar
  h += '<div class="locbar"><span class="locdot '+(LOC_STATE==='ok'?'on':LOC_STATE==='err'?'err':'')+'"></span>';
  if(LOC_STATE==='ok' && POS) h += '<span>GPS on · updated '+Math.max(0,Math.round((Date.now()-POS.at)/60000))+' min ago</span><button data-act="locate">refresh</button>';
  else if(LOC_STATE==='err') h += '<span>'+esc(LOC_ERRMSG)+'</span><button data-act="locate">retry</button>';
  else h += '<span>Enable GPS to see distance to your next stop</span><button data-act="locate">turn on</button>';
  h += '</div>';

  // due / overdue todos — due-today first, cap at 2 so the Next Stop hero stays visible
  const due = TRIP.todos.filter(td=>!S.todos[td.id] && td.due && td.due<=t)
                        .sort((a,b)=>a.due===b.due?0:(a.due===t?-1:b.due===t?1:a.due<b.due?-1:1));
  due.slice(0,2).forEach(td=>{
    h += '<div class="alert"><b>'+(td.due<t?'Overdue':'Due today')+' · '+esc(fmtDate(td.due))+'</b> — '+esc(td.title)
       + (td.url?' · <a href="'+esc(td.url)+'" target="_blank" rel="noopener">open link</a>':'')
       + ' <span style="white-space:nowrap">(<a href="#" data-todo-quick="'+esc(td.id)+'">mark done</a>)</span></div>';
  });
  if(due.length>2) h += '<div class="alert" style="background:#FDF6E1;border-color:#F0E2AE;border-left-color:#8A6D00">'
       +'<b style="color:#8A6D00">+'+(due.length-2)+' more deadline'+(due.length-2>1?'s':'')+'</b> — <a href="#" data-goto-todo>open the To-Do tab</a></div>';

  // hero: next stop
  if(ns){
    h += '<div class="hero"><div class="eyebrow">Next stop · Day '+ns.day.n+'</div>'
      +'<h2>'+esc(ns.stop.name)+'</h2>'
      +(ns.stop.note?'<div class="sub">'+esc(ns.stop.note)+'</div>':'')
      +(POS && ns.stop.lat!=null?'<div class="dist">'+distLabelLong(ns.stop)+' <small>as the crow flies</small></div>':'')
      +'<div class="hero-btns">'
      +(ns.stop.lat!=null?'<a class="btn nav" href="'+appleUrl(ns.stop)+'" target="_blank" rel="noopener">'+navSvg+' Apple Maps</a>'
        +'<a class="btn nav g" href="'+googleUrl(ns.stop)+'" target="_blank" rel="noopener">Google Maps</a>':'')
      +'<button class="btn arrive" data-arrive="'+stopKey(ns.day,ns.i)+'">✓ Arrived — next stop</button>'
      +'</div></div>';
  }else{
    h += '<div class="hero done"><div class="eyebrow">All stops checked</div><h2>One loop of a lifetime ✓</h2>'
      +'<div class="sub">Every stop on the itinerary is done. Güle güle, America.</div></div>';
  }

  // day browser
  const idx = DAYS.indexOf(day);
  h += '<div class="daynav">'
    +'<button data-act="prevday" '+(idx===0?'disabled':'')+'>‹ Day '+(idx>0?DAYS[idx-1].n:'')+'</button>'
    +'<span class="dn-mid">'+(DAY_OVERRIDE!=null?'Browsing':'Today')+'</span>'
    +'<button data-act="nextday" '+(idx===DAYS.length-1?'disabled':'')+'>Day '+(idx<DAYS.length-1?DAYS[idx+1].n:'')+' ›</button></div>';
  if(DAY_OVERRIDE!=null) h += '<button class="back-today" data-act="backtoday">↩ back to today (Day '+autoDay().n+')</button>';

  // the day card
  h += '<div class="card"><div class="date-eyebrow">'+esc(fmtDate(day.date))+' · Day '+day.n+'</div>'
    +'<h2 class="daytitle">'+esc(day.title)+'</h2>'+dayChips(day)
    +(day.desc?'<p class="desc">'+esc(day.desc)+'</p>':'');
  if((day.stops||[]).length){
    h += '<div class="section-label" style="margin:8px 0 0">Today’s stops</div>';
    day.stops.forEach((st,i)=>h+=stopRow(day,i,st));
  }
  if(day.stay) h += '<div class="stay"><span>Stay: <b>'+esc(day.stay.place)+'</b>'
      +(day.stay.lat!=null?' · <a href="'+appleUrl(day.stay)+'" target="_blank" rel="noopener">navigate</a>':'')
      +'</span><span class="cost">'+esc(day.stay.cost||'')+'</span></div>';
  if(day.routeUrl) h += '<a class="btn small" style="margin-top:11px" href="'+esc(day.routeUrl)+'" target="_blank" rel="noopener">Full day route ↗</a>';
  h += '</div>';

  // tomorrow teaser
  if(idx < DAYS.length-1){
    const tm = DAYS[idx+1];
    h += '<div class="card" style="opacity:.85"><div class="date-eyebrow">Tomorrow · '+esc(fmtDate(tm.date))+'</div>'
      +'<h2 class="daytitle" style="font-size:16px">'+esc(tm.title)+'</h2>'
      +(tm.drive?'<div class="chips"><span class="chip drive">'+esc(tm.drive)+'</span></div>':'')+'</div>';
  }
  return h;
}

function viewRoute(){
  const ad = autoDay(), t = todayISO();
  let h='';
  TRIP.legs.forEach(leg=>{
    h += '<div class="leg-head"><h2>'+esc(leg.name)+'</h2><span class="dates display">'+esc(leg.dates)+'</span></div>';
    leg.days.forEach(d=>{
      const stops=d.stops||[];
      const done = stops.filter((st,i)=>S.stops[stopKey(d,i)]).length;
      const cls = d.date<t?' past':(d.n===ad.n && t>=TRIP.meta.start && t<=TRIP.meta.end?' today':'');
      h += '<div class="dayrow'+cls+'" data-goday="'+d.n+'">'
        +'<div class="marker"><small>Day</small><b>'+d.n+'</b></div>'
        +'<div class="dr-main"><div class="dr-date">'+esc(fmtDate(d.date))+'</div>'
        +'<div class="dr-title">'+esc(d.title)+'</div>'
        +'<div class="dr-meta">'+esc(d.drive||d.rest||'')+(stops.length?' · <span class="dr-check">'+done+'/'+stops.length+' stops</span>':'')+'</div>'
        +'</div></div>';
    });
  });
  h += '<p class="empty">Tap a day to open it in the Today tab.</p>';
  return h;
}

function viewTodo(){
  const t = todayISO();
  let h='<div class="section-label" style="margin-top:2px">Bookings & deadlines</div>';
  const todos=[...TRIP.todos].sort((a,b)=>(a.due||'9999')<(b.due||'9999')?-1:1);
  todos.forEach(td=>{
    const done=!!S.todos[td.id], over=!done && td.due && td.due<t;
    h += '<div class="todo'+(done?' done':'')+(over?' overdue':'')+'">'
      +'<input type="checkbox" data-todo="'+esc(td.id)+'" '+(done?'checked':'')+'>'
      +'<div><div class="t-title">'+esc(td.title)+'</div>'
      +(td.due?'<span class="t-due">'+(over?'⚠ overdue · ':'')+'by '+esc(fmtDate(td.due))+'</span>':'')
      +'<div class="t-note">'+esc(td.note||'')+(td.url?' <a href="'+esc(td.url)+'" target="_blank" rel="noopener">Open ↗</a>':'')+'</div>'
      +'</div></div>';
  });
  h += '<div class="section-label">Your own list</div>';
  if(!S.custom.length) h+='<p class="empty" style="padding:8px">Add anything — gas, ice for the cooler, souvenirs…</p>';
  S.custom.forEach(c=>{
    const done=!!S.todos[c.id];
    h += '<div class="todo'+(done?' done':'')+'"><input type="checkbox" data-todo="'+esc(c.id)+'" '+(done?'checked':'')+'>'
      +'<div style="flex:1"><div class="t-title">'+esc(c.title)+'</div></div>'
      +'<button data-del="'+esc(c.id)+'" style="color:var(--shield-red);font-size:18px;padding:0 4px" aria-label="Delete">×</button></div>';
  });
  h += '<div class="addrow"><input type="text" id="new-todo" placeholder="Add an item…" enterkeyhint="done">'
     +'<button data-act="addtodo">Add</button></div>';
  return h;
}

function viewInfo(){
  const b=TRIP.budget||{rows:[]};
  let h='';
  if(!matchMedia('(display-mode: standalone)').matches){
    h += '<div class="install-hint"><b>📲 Install:</b> in Safari tap <b>Share → Add to Home Screen</b> — you get a full-screen app that works offline.</div>';
  }
  h += '<div class="panel"><h3 class="display">Budget (2 people)</h3><table><thead><tr><th>Item</th><th>Detail</th><th>Est.</th></tr></thead><tbody>';
  b.rows.forEach(r=>h+='<tr><td><b>'+esc(r[0])+'</b></td><td>'+esc(r[1])+'</td><td>'+esc(r[2])+'</td></tr>');
  if(b.total) h+='<tr class="total"><td>'+esc(b.total[0])+'</td><td>'+esc(b.total[1])+'</td><td>'+esc(b.total[2])+'</td></tr>';
  h += '</tbody></table></div>';

  h += '<div class="panel"><h3 class="display">Road rules</h3>';
  (TRIP.tips||[]).forEach(tp=>h+='<div class="tip"><b>'+esc(tp.t)+'</b>'+esc(tp.d)+'</div>');
  h += '</div>';

  h += '<div class="panel"><h3 class="display">Trip data</h3>'
    +'<p class="fineprint" style="margin:0 0 8px">This app renders any <code>trip-tracker/v1</code> JSON. Export this trip, or paste another trip’s JSON to switch.</p>'
    +'<textarea id="io" placeholder="Paste trip JSON here to import…"></textarea>'
    +'<div class="btnrow">'
    +'<button class="btn small" data-act="export">Export JSON</button>'
    +'<button class="btn small" data-act="import">Import from box</button>'
    +(localStorage.getItem(CUSTOM_KEY)?'<button class="btn small plain" data-act="unimport">Restore default trip</button>':'')
    +'<button class="btn small warn" data-act="reset">Reset progress</button>'
    +'</div>'
    +'<p class="fineprint">Progress is stored on this phone (per trip). Version '+esc(TRIP.format||'')+' · '+DAYS.length+' days · '
    +DAYS.reduce((a,d)=>a+(d.stops||[]).length,0)+' stops.</p></div>';
  return h;
}

/* ================= render & events ================= */
function render(){
  renderHeader();
  const v = $('#view');
  v.innerHTML = TAB==='today'?viewToday():TAB==='route'?viewRoute():TAB==='todo'?viewTodo():viewInfo();
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active', b.dataset.tab===TAB));
}

document.getElementById('tabs').addEventListener('click', e=>{
  const b = e.target.closest('button[data-tab]'); if(!b) return;
  TAB = b.dataset.tab; window.scrollTo(0,0); render();
});

document.getElementById('view').addEventListener('click', e=>{
  const t = e.target;
  const gt = t.closest('[data-goto-todo]');
  if(gt){ e.preventDefault(); TAB='todo'; window.scrollTo(0,0); render(); return; }
  const q = t.closest('[data-todo-quick]');
  if(q){ e.preventDefault(); S.todos[q.dataset.todoQuick]=true; save(); render(); return; }
  const arr = t.closest('[data-arrive]');
  if(arr){ S.stops[arr.dataset.arrive]=true; save(); render(); return; }
  const del = t.closest('[data-del]');
  if(del){ S.custom = S.custom.filter(c=>c.id!==del.dataset.del); delete S.todos[del.dataset.del]; save(); render(); return; }
  const row = t.closest('[data-goday]');
  if(row){ DAY_OVERRIDE = +row.dataset.goday; TAB='today'; window.scrollTo(0,0); render(); return; }
  const act = t.closest('[data-act]');
  if(!act) return;
  const a = act.dataset.act;
  if(a==='locate') locate(false);
  else if(a==='prevday' || a==='nextday'){
    const idx = DAYS.indexOf(currentDay()) + (a==='nextday'?1:-1);
    if(idx>=0 && idx<DAYS.length){ DAY_OVERRIDE = DAYS[idx].n; if(DAYS[idx].n===autoDay().n) DAY_OVERRIDE=null; render(); }
  }
  else if(a==='backtoday'){ DAY_OVERRIDE=null; render(); }
  else if(a==='addtodo'){
    const inp = $('#new-todo'); const val=(inp.value||'').trim(); if(!val) return;
    S.custom.push({id:'c'+Date.now(), title:val}); save(); render();
  }
  else if(a==='export'){
    const data = JSON.stringify(TRIP,null,2);
    $('#io').value = data;
    if(navigator.share) navigator.share({title:TRIP.meta.name+' — trip.json', text:data}).catch(()=>{});
    else if(navigator.clipboard) navigator.clipboard.writeText(data).then(()=>alert('Trip JSON copied to clipboard'));
  }
  else if(a==='import'){
    try{
      const t2 = JSON.parse($('#io').value);
      if(!t2 || !t2.legs || !t2.meta) throw new Error('Missing meta/legs — is this a trip-tracker JSON?');
      localStorage.setItem(CUSTOM_KEY, JSON.stringify(t2));
      location.reload();
    }catch(err){ alert('Import failed: '+err.message); }
  }
  else if(a==='unimport'){ localStorage.removeItem(CUSTOM_KEY); location.reload(); }
  else if(a==='reset'){
    if(confirm('Reset all checkboxes and progress for this trip?')){
      localStorage.removeItem(SKEY()); location.reload();
    }
  }
});

document.getElementById('view').addEventListener('change', e=>{
  const t = e.target;
  if(t.matches('[data-stop]')){ S.stops[t.dataset.stop] = t.checked; if(!t.checked) delete S.stops[t.dataset.stop]; save(); render(); }
  else if(t.matches('[data-todo]')){ S.todos[t.dataset.todo] = t.checked; if(!t.checked) delete S.todos[t.dataset.todo]; save(); render(); }
});
document.getElementById('view').addEventListener('keydown', e=>{
  if(e.target.id==='new-todo' && e.key==='Enter'){ e.preventDefault(); const b=$('[data-act="addtodo"]'); b&&b.click(); }
});

/* refresh distances every minute while visible */
setInterval(()=>{ if(TAB==='today' && LOC_STATE==='ok' && !document.hidden) locate(true); }, 120000);
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden && S.geoOk) locate(true); });

if(S.geoOk) locate(true);
render();

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW failed', e));
</script>
