<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Western Loop">
<meta name="theme-color" content="#23272B">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>The Grand Western Loop — Trip Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --asphalt:#23272B; --asphalt-2:#2E3338; --paper:#FAF8F2; --card:#FFFFFF;
    --ink:#22262A; --ink-soft:#5A6068;
    --sign-green:#00693C; --sign-green-dark:#00552F;
    --interstate-blue:#10437C; --shield-red:#B01E24; --dash-yellow:#F5C518;
    --line:#E2DDD0; --radius:12px;
    --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{font-family:'Public Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;font-size:15px;
       padding-bottom:calc(76px + var(--sab));overscroll-behavior-y:none}
  .display{font-family:'Oswald',system-ui,sans-serif;text-transform:uppercase;letter-spacing:.04em}
  button{font:inherit;border:none;cursor:pointer;background:none}
  a{color:var(--interstate-blue)}

  /* ===== header ===== */
  header{background:var(--asphalt);color:#fff;padding:calc(14px + var(--sat)) 16px 12px;position:sticky;top:0;z-index:30;
         box-shadow:0 2px 8px rgba(0,0,0,.25)}
  .hrow{display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:720px;margin:0 auto}
  .htitle{font-family:'Oswald';font-weight:600;font-size:17px;text-transform:uppercase;letter-spacing:.05em;line-height:1.15}
  .htitle span{color:var(--dash-yellow)}
  .hday{font-family:'Oswald';font-size:12px;letter-spacing:.12em;text-transform:uppercase;background:var(--interstate-blue);
        border:2px solid #fff;border-radius:8px;padding:4px 10px;white-space:nowrap}
  .progress{max-width:720px;margin:10px auto 0;height:8px;background:#3A4046;border-radius:99px;position:relative;overflow:hidden}
  .progress i{position:absolute;left:0;top:0;bottom:0;background:var(--dash-yellow);border-radius:99px;transition:width .4s}
  .progress-label{max-width:720px;margin:5px auto 0;font-size:10.5px;color:#9AA1A8;letter-spacing:.1em;text-transform:uppercase;
                  display:flex;justify-content:space-between}
  .roadline{height:10px;background:var(--asphalt);position:relative}
  .roadline::before{content:"";position:absolute;left:0;right:0;top:50%;height:3px;transform:translateY(-50%);
    background:repeating-linear-gradient(90deg,var(--dash-yellow) 0 26px,transparent 26px 46px)}

  main{max-width:720px;margin:0 auto;padding:14px 14px 30px}

  /* ===== cards / shared ===== */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;
        box-shadow:0 1px 4px rgba(34,38,42,.06);margin-bottom:12px}
  .date-eyebrow{font-family:'Oswald';font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--shield-red);font-weight:600}
  h2.daytitle{font-family:'Oswald';font-size:21px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;margin:2px 0 8px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .chip{font-size:11.5px;font-weight:600;border-radius:5px;padding:2px 9px}
  .chip.drive{background:#EDF4EF;color:var(--sign-green);border:1px solid #CBE0D3}
  .chip.wx{background:#FDF6E1;color:#8A6D00;border:1px solid #F0E2AE}
  .chip.rest{background:#EEF2F8;color:var(--interstate-blue);border:1px solid #D4DFEE}
  .chip.sun{background:#FFF4DC;color:#9A6B00;border:1px solid #F0DFAE}
  .chip.leave{background:#F3EDFB;color:#5B2D91;border:1px solid #DFD0F0}
  .chip.tz{background:#23272B;color:var(--dash-yellow);border:1px solid #23272B}
  .costline{display:flex;flex-wrap:wrap;gap:4px 10px;align-items:baseline;border-top:1px dashed var(--line);
            padding-top:9px;margin-top:9px;font-size:12px;color:var(--ink-soft)}
  .costline b{font-family:'Oswald';font-size:14.5px;color:var(--sign-green);letter-spacing:.03em}
  .night{background:var(--asphalt);color:#E8EAEC;border-radius:12px;border-left:5px solid var(--dash-yellow);
         padding:12px 14px;font-size:13px;margin-bottom:12px}
  .night b{color:var(--dash-yellow);font-family:'Oswald';text-transform:uppercase;letter-spacing:.06em;font-size:13px}
  .night .sub2{color:#B7BCC2;margin-top:3px}
  .stop .s-when{font-size:11.5px;color:#9A6B00;font-weight:700}
  .btn.arrive.near{background:#2BA05A;color:#fff;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(43,160,90,.5)}50%{box-shadow:0 0 0 9px rgba(43,160,90,0)}}
  /* map & recap */
  .mapwrap{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:10px;margin-bottom:12px}
  .mapwrap svg{width:100%;height:auto;display:block}
  .maplegend{display:flex;gap:14px;justify-content:center;font-size:11px;color:var(--ink-soft);padding:8px 0 2px;flex-wrap:wrap}
  .maplegend i{display:inline-block;width:16px;height:4px;border-radius:2px;vertical-align:2px;margin-right:5px}
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
  .statcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;text-align:center}
  .statcard b{display:block;font-family:'Oswald';font-size:22px;font-weight:600;color:var(--interstate-blue)}
  .statcard small{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft)}
  .recap-hero{background:var(--sign-green);color:#fff;border-radius:14px;border:3px solid #fff;outline:2px solid var(--sign-green-dark);
              padding:16px;margin-bottom:12px;text-align:center}
  .recap-hero h2{font-family:'Oswald';font-size:22px;text-transform:uppercase;letter-spacing:.03em}
  .recap-hero p{font-size:12.5px;color:rgba(255,255,255,.85);margin-top:4px}
  /* guide bottom sheet */
  .sheet-ov{position:fixed;inset:0;background:rgba(20,22,25,.55);z-index:60;opacity:0;transition:opacity .25s;pointer-events:none}
  .sheet-ov.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--paper);border-radius:18px 18px 0 0;
         max-height:88vh;transform:translateY(105%);transition:transform .32s cubic-bezier(.2,.8,.25,1);
         display:flex;flex-direction:column;box-shadow:0 -6px 30px rgba(0,0,0,.3)}
  .sheet.open{transform:none}
  .sheet-grip{width:44px;height:5px;border-radius:3px;background:#C9C4B6;margin:9px auto 4px;flex:none}
  .sheet-head{padding:6px 18px 12px;border-bottom:1px solid var(--line);flex:none;display:flex;gap:10px;align-items:flex-start}
  .sheet-head .sh-main{flex:1;min-width:0}
  .sheet-head .sh-day{font-family:'Oswald';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--shield-red);font-weight:600}
  .sheet-head h3{font-family:'Oswald';font-size:20px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;line-height:1.15}
  .sheet-head .sh-meta{font-size:12px;color:#9A6B00;font-weight:700;margin-top:2px}
  .sheet-head .sh-dist{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .sheet-close{flex:none;width:34px;height:34px;border-radius:50%;background:#ECE8DC;color:var(--ink-soft);
               font-size:17px;display:flex;align-items:center;justify-content:center;font-weight:700}
  .sheet-body{overflow-y:auto;padding:14px 18px calc(26px + var(--sab));-webkit-overflow-scrolling:touch}
  .g-what{font-size:14px;color:#33383E;line-height:1.6;margin-bottom:14px}
  .g-sec{font-family:'Oswald';font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--sign-green);margin:14px 0 7px}
  .g-sec.blue{color:var(--interstate-blue)}
  .g-list{list-style:none}
  .g-list li{font-size:13.5px;color:#3B4148;padding:5px 0 5px 20px;position:relative;line-height:1.5;border-bottom:1px solid #F0EDE4}
  .g-list li:last-child{border-bottom:none}
  .g-list li::before{content:"▸";position:absolute;left:2px;color:var(--dash-yellow);font-weight:700}
  .g-fact{background:#FDF6E1;border:1px solid #F0E2AE;border-left:5px solid var(--dash-yellow);border-radius:10px;
          padding:11px 13px;font-size:13px;color:#5C4A00;line-height:1.55;margin-top:14px}
  .g-fact b{font-family:'Oswald';text-transform:uppercase;letter-spacing:.1em;font-size:11.5px;display:block;margin-bottom:3px;color:#8A6D00}
  .g-map{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 10px 7px;margin:2px 0 14px}
  .g-map svg{width:100%;height:auto;display:block;font-family:'Oswald',sans-serif}
  .g-map-cap{font-size:12px;color:#3B4148;margin-top:7px;line-height:1.45}
  .g-map-note{font-size:10px;color:#B5B0A2;text-transform:uppercase;letter-spacing:.12em;margin-top:3px}
  .g-btns{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
  .g-hint{color:#B5B0A2;font-weight:400;font-size:13px;margin-left:4px}
  .stop .s-main{cursor:pointer}
  .desc{font-size:13.5px;color:#3B4148;margin-bottom:8px}
  .stay{display:flex;justify-content:space-between;gap:10px;align-items:center;border-top:1px dashed var(--line);
        padding-top:9px;margin-top:9px;font-size:13px}
  .stay b{color:var(--ink)}
  .stay .cost{font-family:'Oswald';font-size:14px;color:var(--sign-green);font-weight:600;white-space:nowrap}

  /* ===== hero (next stop) ===== */
  .hero{background:var(--sign-green);color:#fff;border-radius:14px;border:3px solid #fff;outline:2px solid var(--sign-green-dark);
        box-shadow:0 4px 14px rgba(0,0,0,.18);padding:16px;margin-bottom:14px}
  .hero .eyebrow{font-family:'Oswald';font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--dash-yellow)}
  .hero h2{font-family:'Oswald';font-size:24px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;line-height:1.1;margin:4px 0 2px}
  .hero .sub{font-size:13px;color:rgba(255,255,255,.85)}
  .hero .dist{margin-top:8px;font-family:'Oswald';font-size:16px;color:var(--dash-yellow);letter-spacing:.04em}
  .hero .dist small{color:rgba(255,255,255,.75);font-family:'Public Sans';font-size:12px;letter-spacing:0;text-transform:none}
  .hero-btns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:'Oswald';font-size:13.5px;
       letter-spacing:.07em;text-transform:uppercase;font-weight:500;padding:11px 15px;border-radius:9px;text-decoration:none;
       min-height:44px}
  .btn.nav{background:var(--interstate-blue);color:#fff;flex:1 1 auto}
  .btn.nav.g{background:#fff;color:var(--interstate-blue)}
  .btn.arrive{background:var(--dash-yellow);color:#1c1c1c;flex:1 1 100%}
  .btn.ghost{background:transparent;border:2px solid var(--line);color:var(--ink-soft)}
  .btn:active{transform:scale(.98)}
  .hero.done{background:var(--interstate-blue);outline-color:#0A3159}

  .locbar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);margin:0 2px 12px}
  .locbar button{color:var(--interstate-blue);font-weight:600;font-size:12px;text-decoration:underline}
  .locdot{width:8px;height:8px;border-radius:50%;background:#B8BEC5;flex:none}
  .locdot.on{background:#2BA05A;box-shadow:0 0 0 3px rgba(43,160,90,.2)}
  .locdot.err{background:var(--shield-red)}

  /* ===== alerts ===== */
  .alert{background:#FBEBEC;border:1px solid #EBC2C4;border-left:5px solid var(--shield-red);border-radius:10px;
         padding:10px 13px;font-size:13px;margin-bottom:10px}
  .alert b{color:var(--shield-red);font-family:'Oswald';text-transform:uppercase;letter-spacing:.05em;font-size:12.5px}

  /* ===== stops checklist ===== */
  .stop{display:flex;gap:11px;align-items:flex-start;padding:11px 2px;border-bottom:1px solid #F0EDE4}
  .stop:last-child{border-bottom:none}
  .stop input[type=checkbox]{width:22px;height:22px;accent-color:var(--sign-green);flex:none;margin-top:1px}
  .stop .s-main{flex:1;min-width:0}
  .stop .s-name{font-weight:600;font-size:14px}
  .stop .s-note{font-size:12px;color:var(--ink-soft)}
  .stop .s-opt{font-size:10px;font-weight:700;letter-spacing:.08em;color:#8A6D00;background:#FDF6E1;border-radius:4px;padding:1px 6px;
               text-transform:uppercase;vertical-align:2px;margin-left:5px}
  .stop.done .s-name{text-decoration:line-through;color:var(--ink-soft)}
  .stop .s-nav{flex:none;width:40px;height:40px;border-radius:9px;background:var(--interstate-blue);color:#fff;
               display:flex;align-items:center;justify-content:center;text-decoration:none}
  .stop .s-nav svg{width:17px;height:17px}
  .stop .s-dist{flex:none;font-family:'Oswald';font-size:11.5px;color:var(--ink-soft);margin-top:11px;white-space:nowrap}

  .section-label{font-family:'Oswald';font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);
                 margin:16px 4px 8px}
  .daynav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
  .daynav button{font-family:'Oswald';font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--interstate-blue);
                 font-weight:600;padding:8px 12px;border-radius:8px;background:#EEF2F8;border:1px solid #D4DFEE}
  .daynav button:disabled{opacity:.35}
  .daynav .dn-mid{font-family:'Oswald';font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)}
  .back-today{display:block;width:100%;text-align:center;margin:-4px 0 12px;color:var(--shield-red);font-weight:700;font-size:12.5px;
              text-decoration:underline;padding:6px}

  /* ===== route (itinerary) ===== */
  .leg-head{background:var(--sign-green);color:#fff;border-radius:12px;border:3px solid #fff;outline:2px solid var(--sign-green-dark);
            padding:11px 16px;display:flex;justify-content:space-between;align-items:baseline;gap:6px;margin:18px 0 10px;
            box-shadow:0 2px 8px rgba(0,0,0,.12)}
  .leg-head h2{font-family:'Oswald';font-size:16px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .leg-head .dates{font-family:'Oswald';font-size:13px;color:var(--dash-yellow);letter-spacing:.08em}
  .dayrow{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
          padding:12px 14px;margin-bottom:9px;cursor:pointer}
  .dayrow.today{border:2px solid var(--dash-yellow);box-shadow:0 2px 10px rgba(245,197,24,.25)}
  .dayrow.past{opacity:.62}
  .marker{flex:none;width:46px;height:42px;background:var(--interstate-blue);border:2px solid #fff;outline:1.5px solid #0A3159;
          border-radius:8px 8px 13px 13px;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;
          box-shadow:0 2px 5px rgba(0,0,0,.22)}
  .marker small{font-size:7.5px;letter-spacing:.13em;font-weight:700;text-transform:uppercase;color:#BFD3EC}
  .marker b{font-family:'Oswald';font-size:16px;font-weight:600;line-height:1}
  .dayrow.past .marker{background:var(--sign-green);outline-color:var(--sign-green-dark)}
  .dr-main{flex:1;min-width:0}
  .dr-date{font-family:'Oswald';font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--shield-red);font-weight:600}
  .dr-title{font-family:'Oswald';font-size:15.5px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;line-height:1.2}
  .dr-meta{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .dr-check{font-family:'Oswald';font-size:11px;color:var(--sign-green);letter-spacing:.06em}

  /* ===== todos ===== */
  .todo{display:flex;gap:11px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
        padding:13px 14px;margin-bottom:9px}
  .todo input[type=checkbox]{width:22px;height:22px;accent-color:var(--sign-green);flex:none;margin-top:2px}
  .todo .t-title{font-family:'Oswald';font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:.02em}
  .todo .t-due{display:inline-block;font-size:11px;font-weight:700;border-radius:4px;padding:1px 7px;margin:3px 0 4px;
               background:#EEF2F8;color:var(--interstate-blue);letter-spacing:.05em;text-transform:uppercase}
  .todo.overdue .t-due{background:#FBEBEC;color:var(--shield-red)}
  .todo .t-note{font-size:12.5px;color:var(--ink-soft)}
  .todo .t-note a{font-weight:600}
  .todo.done{opacity:.5}
  .todo.done .t-title{text-decoration:line-through}
  .addrow{display:flex;gap:8px;margin:12px 0 4px}
  .addrow input[type=text]{flex:1;border:1px solid var(--line);border-radius:9px;padding:11px 13px;font:inherit;background:#fff}
  .addrow button{background:var(--sign-green);color:#fff;border-radius:9px;padding:0 18px;font-family:'Oswald';
                 text-transform:uppercase;letter-spacing:.06em;font-size:13px}

  /* ===== info ===== */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
  .panel h3{font-family:'Oswald';font-size:16px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{font-family:'Oswald';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);text-align:left;
     padding:6px 6px;border-bottom:2px solid var(--asphalt)}
  td{padding:8px 6px;border-bottom:1px solid var(--line);vertical-align:top}
  td:last-child,th:last-child{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
  tr.total td{font-weight:700;border-bottom:none;border-top:2px solid var(--asphalt);font-family:'Oswald';font-size:13px}
  .tip{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:12.5px;margin-bottom:8px}
  .tip b{font-family:'Oswald';text-transform:uppercase;letter-spacing:.05em;font-size:12px;color:var(--interstate-blue);display:block;margin-bottom:2px}
  textarea{width:100%;min-height:110px;border:1px solid var(--line);border-radius:9px;padding:10px;font:12px ui-monospace,monospace;
           background:#fff;margin-bottom:8px}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap}
  .btn.small{min-height:38px;padding:8px 13px;font-size:12px;background:var(--interstate-blue);color:#fff}
  .btn.small.warn{background:var(--shield-red)}
  .btn.small.plain{background:#EEF2F8;color:var(--interstate-blue);border:1px solid #D4DFEE}
  .fineprint{font-size:11.5px;color:var(--ink-soft);margin-top:8px}

  /* ===== tab bar ===== */
  nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--asphalt);border-top:3px solid var(--dash-yellow);
      display:flex;padding-bottom:var(--sab)}
  nav button{flex:1;color:#9AA1A8;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 7px;
             font-family:'Oswald';font-size:10px;letter-spacing:.14em;text-transform:uppercase;position:relative}
  nav button.active{color:var(--dash-yellow)}
  nav button svg{width:21px;height:21px}
  nav .badge{position:absolute;top:4px;left:calc(50% + 8px);background:var(--shield-red);color:#fff;font-size:9.5px;font-weight:700;
             border-radius:99px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px;
             font-family:'Public Sans';letter-spacing:0}

  .empty{color:var(--ink-soft);font-size:13px;text-align:center;padding:20px 10px}
  .install-hint{background:#EEF2F8;border:1px solid #D4DFEE;border-radius:10px;padding:11px 13px;font-size:12.5px;color:var(--interstate-blue);
                margin-bottom:12px}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <div class="htitle" id="hdr-title">Trip <span>Tracker</span></div>
    <div class="hday display" id="hdr-day"></div>
  </div>
  <div class="progress"><i id="prog-bar" style="width:0%"></i></div>
  <div class="progress-label"><span id="prog-label"></span><span id="prog-pct"></span></div>
</header>
<div class="roadline"></div>

<script type="application/json" id="trip-data">{"format":"trip-tracker/v1","meta":{"id":"grand-western-loop-2026","name":"The Grand Western Loop","tagline":"Chicago → West → Chicago · 2 brothers, 1 pickup truck","start":"2026-07-05","end":"2026-07-29","origin":{"name":"Chicago","lat":41.8781,"lng":-87.6298},"states":["IL","WI","MN","SD","WY","MT","ID","UT","AZ","NV","CA","NM","TX","OK","MO"],"stats":[["24","nights"],["~4,900 mi","driving"],["7","national parks"],["2","theme parks"]]},"todos":[{"id":"t1","title":"Hotel: West Yellowstone ×2","due":"2026-07-03","note":"Nights of Jul 9 & 10. July occupancy runs 90%+ and rates $305–559. Backup if full: Island Park, ID (30 min south, cheaper).","url":"https://www.booking.com/city/us/west-yellowstone.html"},{"id":"t2","title":"Hotel: Springdale (Zion) ×2","due":"2026-07-03","note":"Nights of Jul 14 & 15. Springdale sits at the park gate and fills fast; backup: Hurricane, UT (25 min).","url":"https://www.booking.com/city/us/springdale.html"},{"id":"t4","title":"Hotel: Jackson or Victor, ID","due":"2026-07-03","note":"Night of Jul 11. Jackson is charming but ~$300+; Victor, ID over the Teton Pass is ~$180 and 35 min away."},{"id":"t8","title":"Pack for 3 climates","due":"2026-07-05","note":"Fleece/jacket (Yellowstone nights hit 5–8°C), swimwear + water shoes (the Narrows), sunscreen & 4L water jugs (desert days 38–40°C). Cooler for the truck bed."},{"id":"t5","title":"America the Beautiful pass","due":"2026-07-06","note":"$80 per vehicle at the Badlands gate — covers every national park on this route (would be $205+ separately). Keep it on the dashboard.","url":null},{"id":"t6","title":"Cody Nite Rodeo tickets","due":"2026-07-06","note":"~$25/person, runs every summer night at 8pm — for the Jul 8 show. Easy to buy online a couple of days out.","url":"https://codystampederodeo.com"},{"id":"t9","title":"Download offline maps (WY, UT, AZ, NM)","due":"2026-07-08","note":"Google Maps → profile → Offline maps. Dead zones ahead in Yellowstone, Bryce and long stretches of AZ/NM."},{"id":"t3","title":"Universal Hollywood tickets ×2","due":"2026-07-10","note":"Dated tickets for Sat Jul 18 — from ~$154/adult for July weekends. Buy the Super Nintendo World early-access add-on if available.","url":"https://www.universalstudioshollywood.com"},{"id":"t7","title":"Silver Dollar City tickets","due":"2026-07-23","note":"~$99/person online, for Jul 26. Marvel Cave tour is included with admission — do it in the afternoon heat.","url":"https://www.silverdollarcity.com"},{"id":"t10","title":"Gateway Arch tram slot","due":"2026-07-26","note":"Book the 3–4pm tram slot online for Jul 27 — summer slots sell out day-of.","url":"https://www.gatewayarch.com"}],"legs":[{"name":"Leg 1 · Great Plains & Black Hills","dates":"Jul 5 – 8","days":[{"n":1,"date":"2026-07-05","title":"Chicago → Sioux Falls, SD","tz":"America/Chicago","mi":570,"drive":"570 mi · ~8 h — the one big push","wx":"Sunny, 34°C","leaveBy":"8:00","leaveNote":"570 mi — arrive with light left for Falls Park.","costs":{"stay":120,"food":65,"fuel":110},"desc":"Knock out the prairie on day one while you're fresh. Evening leg-stretch at Falls Park's waterfalls downtown.","stops":[{"name":"Falls Park, Sioux Falls","lat":43.5586,"lng":-96.7226,"when":"evening","dur":"~45 min","note":"Waterfalls downtown — evening leg-stretch","guide":{"what":"The city is literally named after these falls: the Big Sioux River drops ~30 m here over ledges of pink Sioux quartzite — rock so hard it was quarried to build half the town. The 1881 Queen Bee Mill ruins beside the falls were once one of the largest flour mills in the world; it went bust in two years because the river's flow was never as reliable as promised.","see":["Five-story observation tower (free) — best overview of the falls","Queen Bee Mill ruins — walk right up to the 140-year-old quartzite walls","The falls light up after dark; the café in the old power house does decent ice cream"],"tips":["45 minutes is plenty — it's a leg-stretch, not a hike","Free parking at Falls Park lot; downtown Phillips Ave (5 min) for dinner afterwards"],"fact":"That pink stone underfoot is ~1.6 billion years old — you'll be standing on rock a third the age of the Earth before you've even reached the national parks."}}],"stay":{"place":"Sioux Falls — any downtown chain hotel","cost":"~$120","lat":43.546,"lng":-96.7313},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Chicago%2C+IL&destination=Falls+Park%2C+Sioux+Falls%2C+SD"},{"n":2,"date":"2026-07-06","title":"Sioux Falls → Badlands NP → Wall","tz":"America/Denver","mi":290,"mapLabel":"Badlands","drive":"~290 mi · 4.5 h + park loop","wx":"Sunny, ~31°C","leaveBy":"8:00","leaveNote":"Badlands Loop Road is best in golden hour — don't burn the morning.","costs":{"stay":140,"food":70,"fuel":55,"extra":[["Parks pass",80]]},"desc":"Buy the $80 parks pass at the Badlands gate. Drive the Loop Road in golden-hour light; bighorn sheep at dusk.","stops":[{"name":"Corn Palace, Mitchell","lat":43.7166,"lng":-98.0263,"dur":"15 min","note":"World's only — photo stop","guide":{"what":"A Moorish-revival arena in the middle of the prairie, redecorated every single year since 1892 with murals made entirely of corn — about 325,000 ears, nailed on cob by cob by local crews. It started as a stunt to prove South Dakota's soil could grow anything, and simply never stopped.","see":["This year's exterior murals — a new theme is designed annually by a local artist","Step inside (free): it's a working basketball arena and concert hall with corn chandeliers","The hallway photos of every mural design back to the 1890s"],"tips":["15 minutes is genuinely enough; it's a photo stop","Free street parking on Main St; there's a decent coffee shop across the street"],"fact":"Locals call it the World's Only Corn Palace, and nobody has ever bothered to dispute the claim."}},{"name":"Door & Notch Trailhead","lat":43.7529,"lng":-101.927,"when":"golden hour 6–8pm","dur":"~1 h","note":"First stop past the NE entrance — buy the $80 pass at the gate booth","guide":{"what":"The Badlands are what 500,000 years of rain does to an ancient sea bed and river floodplain: a 100-km wall of striped spires eroding about 2.5 cm every year — one of the fastest-vanishing landscapes on Earth. The bands of color are time itself: each stripe is a different epoch of mud, ash and river sand, stacked over 75 million years.","see":["Door Trail (1.2 km, boardwalk then open moonscape) — walk through 'the Door,' a break in the Wall","Notch Trail (2.4 km round trip) — climbs a log ladder to a ledge with a huge view over the White River valley; skip if heights bother you","Window Trail (100 m) — the lazy option, straight to a framed view"],"tips":["Golden hour (6–8pm) turns the grey spires orange and pink — this is why you're here in the evening","Rattlesnakes are real here: stay on obvious paths, look before you step","No shade at all — bring water even for these short walks","Bighorn sheep often stand on the spires near the trailhead parking at dusk"],"fact":"The Lakota named it 'mako sica' — literally 'bad land' — and French trappers agreed: 'les mauvaises terres à traverser,' bad lands to cross. Everyone who ever saw it named it the same thing.","map":{"caption":"One parking lot, three trails: Door (easy, through the gap), Window (shortest), Notch (ladder + ledge). Golden-hour light comes from behind you facing the Wall.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><text x='12' y='20' font-size='10' fill='#B01E24' font-weight='700'>⚠ rattlesnakes — stay on paths<\/text><polyline points='10,80 40,60 70,85 100,55 130,80 160,58 190,82 220,62 245,86 275,60 305,82 330,68' fill='none' stroke='#B98A56' stroke-width='3'/><text x='60' y='42' font-size='10' fill='#B98A56' font-weight='700'>THE WALL — badlands spires<\/text><path d='M170,178 C185,150 225,125 252,95' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='7 5'/><text x='196' y='142' font-size='10' fill='#8A6D00'>Door Trail 1.2 km<\/text><text x='258' y='84' font-size='14'>📷<\/text><text x='236' y='110' font-size='10.5' fill='#22262A' font-weight='700'>the Door — go beyond the gap<\/text><path d='M150,180 C112,164 84,140 72,112' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='7 5'/><line x1='62' y1='112' x2='78' y2='96' stroke='#5A6068' stroke-width='2'/><line x1='66' y1='116' x2='82' y2='100' stroke='#5A6068' stroke-width='2'/><text x='24' y='128' font-size='10' fill='#22262A'>log ladder<\/text><text x='82' y='88' font-size='12'>⭐<\/text><text x='96' y='92' font-size='10' fill='#22262A'>Notch ledge view<\/text><path d='M192,178 C205,150 212,132 215,110' fill='none' stroke='#D69500' stroke-width='2.5' stroke-dasharray='5 4'/><text x='222' y='126' font-size='10' fill='#5A6068'>Window (100 m)<\/text><rect x='148' y='178' width='44' height='20' rx='3' fill='#EEF2F8' stroke='#10437C' stroke-width='1.5'/><text x='163' y='192' font-size='12' fill='#10437C' font-weight='700'>🅿<\/text><path d='M10,212 H330' stroke='#697077' stroke-width='7' fill='none'/><text x='118' y='231' font-size='10' fill='#5A6068'>Badlands Loop Rd (Hwy 240)<\/text><text x='236' y='206' font-size='10' fill='#00693C' font-weight='700'>◂ you arrive (NE entrance)<\/text><\/svg>"}}},{"name":"Badlands NP — Ben Reifel Visitor Center","lat":43.7508,"lng":-101.9415,"note":"Fossil lab + water refill, 5 min past the trailheads","guide":{"what":"The park's main visitor center, named after Ben Reifel, the first Lakota member of Congress. The Badlands are one of the richest fossil beds on the planet — this whole area was a subtropical floodplain 34 million years ago, crawling with three-toed horses, giant pig-like entelodonts and sabre-toothed nimravids.","see":["The Fossil Preparation Lab — real paleontologists cleaning real fossils behind glass, happy to chat","The 5-minute film is actually good if you want A/C","Fossil exhibits: oreodonts (sheep-sized grazers) are the local celebrity — they're found nowhere else in such numbers"],"tips":["Refill every water bottle here — it's the only reliable water in the park","If the entrance booth was unmanned when you came in, you can buy the parks pass here"],"fact":"Kids still find fossils in the park every summer — if you spot bone, photograph it and report it at this desk; several major finds started exactly that way."}},{"name":"Wall Drug","lat":43.993,"lng":-102.2416,"when":"evening or breakfast tomorrow","dur":"45 min","note":"Free ice water since 1931","guide":{"what":"In 1931, pharmacist Ted Hustead and his wife Dorothy were going broke in a town of 300 people. Dorothy's idea: put up highway signs offering FREE ICE WATER. It worked so well that Wall Drug is now a 7,000 m² roadside empire that draws up to 20,000 people a day — and the ice water is still free.","see":["The backyard: the 24-foot jackalope you can sit on, the animatronic T-rex that roars every 12 minutes, the Cowboy Orchestra","The Western art collection in the café — genuinely good paintings, weirdly","Hot cake-sized donuts, made fresh — the maple ones go fast"],"tips":["Coffee is still 5 cents. That's not a typo","It's open till ~9pm in summer; also great for breakfast tomorrow before the drive to Rushmore","You've been seeing its billboards for 500 km — that's the point; there were once Wall Drug signs in Paris and Antarctica"],"fact":"During WWII, GIs painted 'Wall Drug, 9,758 miles' signs across Europe and the Pacific — free advertising that made a South Dakota drugstore world-famous."}}],"stay":{"place":"Wall or Rapid City","cost":"~$140","lat":44.0805,"lng":-103.231},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Sioux+Falls%2C+SD&destination=Wall%2C+SD&waypoints=Corn+Palace%2C+Mitchell%2C+SD%7CBadlands+National+Park"},{"n":3,"date":"2026-07-07","title":"Black Hills Day — Rushmore & Custer","tz":"America/Denver","mi":100,"mapLabel":"Black Hills","drive":"Scenic loop ~100 mi — driving IS the activity","wx":"Mild, ~24°C","leaveBy":"7:15","leaveNote":"Rushmore parking + light are best before 9am; wildlife is most active early.","costs":{"stay":140,"food":70,"fuel":19,"extra":[["Rushmore parking",10]]},"desc":"Mount Rushmore early (parking $10), then take Iron Mountain Road south — its pigtail bridges and tunnels frame Rushmore in the rear-view. Custer State Park's Wildlife Loop (1,300 bison roam free), then the Needles Highway's granite tunnels back north.","stops":[{"name":"Mount Rushmore","lat":43.8791,"lng":-103.4591,"when":"before 9am","dur":"~2 h","note":"Parking $10","guide":{"what":"Four 18-metre faces dynamited out of a granite mountain between 1927 and 1941 by sculptor Gutzon Borglum and 400 workers — 90% of the 'carving' was actually done with dynamite, to within 10 cm of the final surface. Washington for founding, Jefferson for expansion, Lincoln for preservation, Roosevelt for the parks and the century America stepped onto the world stage.","see":["Presidential Trail (1 km boardwalk loop) — gets you under the faces, much better than the main terrace","The Sculptor's Studio: Borglum's 1:12 plaster model shows the original plan — full torsos down to the waists; money and WWII stopped it","Avenue of Flags for the classic framed photo"],"tips":["The faces look southeast — morning light is exactly right, and you'll beat the buses before 9am","Parking is $10 cash/card per vehicle (private concession — the parks pass does NOT cover it), but the ticket is valid all year","Not one worker died in 14 years of hanging off a cliff with dynamite — the safety record is part of the legend","Leaving south, take Iron Mountain Road (US-16A): its tunnels were deliberately aligned to frame Rushmore in your windshield"],"fact":"Behind Lincoln's head there's a sealed Hall of Records containing porcelain panels of the Constitution and Declaration — built so a civilization 10,000 years from now can figure out who the faces are.","map":{"caption":"Park in the garage, walk the Avenue of Flags to the terrace for the classic shot, then do the Presidential Trail loop counter-clockwise — closest views are under the faces; the Sculptor's Studio is on the way back.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><path d='M75,85 Q170,12 265,85' fill='none' stroke='#B98A56' stroke-width='3'/><circle cx='125' cy='52' r='10' fill='#D9C4A3' stroke='#B98A56' stroke-width='2'/><circle cx='155' cy='44' r='10' fill='#D9C4A3' stroke='#B98A56' stroke-width='2'/><circle cx='185' cy='44' r='10' fill='#D9C4A3' stroke='#B98A56' stroke-width='2'/><circle cx='215' cy='52' r='10' fill='#D9C4A3' stroke='#B98A56' stroke-width='2'/><text x='94' y='26' font-size='9.5' fill='#5A6068'>Washington · Jefferson · Roosevelt · Lincoln<\/text><path d='M138,116 C100,108 92,92 118,74 M202,116 C240,110 252,96 236,80 M118,74 L138,68 M236,80 L216,72' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='7 5'/><text x='18' y='98' font-size='10' fill='#8A6D00'>Presidential Trail<\/text><text x='18' y='110' font-size='10' fill='#8A6D00'>1 km loop, stairs<\/text><rect x='236' y='118' width='44' height='16' rx='2' fill='#fff' stroke='#23272B' stroke-width='1.5'/><text x='240' y='149' font-size='10' fill='#22262A'>Sculptor's Studio ⭐<\/text><rect x='140' y='112' width='60' height='14' rx='2' fill='#fff' stroke='#23272B' stroke-width='1.5'/><text x='118' y='108' font-size='13'>📷<\/text><text x='204' y='123' font-size='10' fill='#22262A'>Grand View Terrace<\/text><line x1='160' y1='132' x2='160' y2='184' stroke='#697077' stroke-width='4'/><circle cx='150' cy='140' r='2.5' fill='#B01E24'/><circle cx='170' cy='140' r='2.5' fill='#10437C'/><circle cx='150' cy='154' r='2.5' fill='#B01E24'/><circle cx='170' cy='154' r='2.5' fill='#10437C'/><circle cx='150' cy='168' r='2.5' fill='#B01E24'/><circle cx='170' cy='168' r='2.5' fill='#10437C'/><text x='182' y='158' font-size='10' fill='#5A6068'>Avenue of Flags<\/text><rect x='134' y='186' width='56' height='20' rx='3' fill='#EEF2F8' stroke='#10437C' stroke-width='1.5'/><text x='146' y='200' font-size='11' fill='#10437C' font-weight='700'>🅿 $10<\/text><path d='M10,222 H330' stroke='#697077' stroke-width='7'/><text x='140' y='237' font-size='10' fill='#5A6068'>Hwy 244<\/text><\/svg>"}}},{"name":"Custer SP Wildlife Loop (State Game Lodge)","lat":43.7622,"lng":-103.3745,"when":"mid-morning","dur":"~2 h","note":"1,300 bison roam free — stay in the truck","guide":{"what":"Custer State Park's 29-km Wildlife Loop crosses open prairie owned by one of the largest publicly-held bison herds on Earth — about 1,300 animals descended from a rescue herd of 36, bought in 1914 when fewer than 1,000 bison were left alive anywhere. This is the closest thing America has to a safari.","see":["Bison herds — often blocking the road entirely; that's the experience, enjoy the jam","The 'begging burros': feral donkeys, descendants of pack animals, who will put their heads through your window looking for snacks","Pronghorn — the fastest land animal in the western hemisphere (88 km/h), prairie dog towns, wild turkeys"],"tips":["Stay IN the truck near bison — they look like sofas and charge like freight trains","Mid-morning works, but the herds are most active early and near dusk","The unpaved side roads off the loop are fine for your pickup and often have the herds to themselves","Your parks pass does not cover Custer SP — it's a state park, ~$20 per vehicle for a 7-day pass"],"fact":"Every September the park holds a real buffalo roundup: cowboys on horseback drive all 1,300 bison into corrals for vaccination — one of the last true Old West spectacles.","map":{"caption":"Drive the 29-km loop clockwise from the State Game Lodge end. Bison decide where bison are; the burros usually hold the southern stretch, prairie dogs the west.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><path d='M170,42 C272,48 300,116 252,178 C204,228 112,222 80,172 C46,120 74,50 170,42 Z' fill='none' stroke='#697077' stroke-width='6'/><rect x='150' y='24' width='40' height='16' rx='2' fill='#fff' stroke='#23272B' stroke-width='1.5'/><text x='198' y='36' font-size='10' fill='#00693C' font-weight='700'>start — State Game Lodge ▸<\/text><text x='286' y='104' font-size='11' fill='#5A6068'>▾<\/text><text x='96' y='214' font-size='11' fill='#5A6068'>◂<\/text><text x='52' y='84' font-size='11' fill='#5A6068'>▴<\/text><text x='120' y='122' font-size='12' fill='#B01E24' font-weight='700'>🦬 bison — anywhere,<\/text><text x='132' y='136' font-size='12' fill='#B01E24' font-weight='700'>stay in the truck<\/text><text x='142' y='196' font-size='12'>⭐<\/text><text x='120' y='210' font-size='10' fill='#22262A'>begging burros zone<\/text><circle cx='72' cy='142' r='2' fill='#B98A56'/><circle cx='80' cy='148' r='2' fill='#B98A56'/><circle cx='68' cy='152' r='2' fill='#B98A56'/><text x='14' y='168' font-size='10' fill='#22262A'>prairie dog town<\/text><text x='224' y='196' font-size='10' fill='#5A6068'>drive clockwise · windows down<\/text><\/svg>"}}},{"name":"Needles Eye Tunnel, Needles Hwy","lat":43.8715,"lng":-103.5311,"dur":"~1.5 h","note":"Granite spires & one-lane tunnels","guide":{"what":"The Needles Highway (SD-87) was declared impossible to build when Governor Peter Norbeck sketched it in 1919 — 22 km threaded through granite spires, finished in 1922 using low-grade dynamite and stubbornness. The Needles themselves are 1.7-billion-year-old granite eroded into organ pipes.","see":["Needles Eye Tunnel: 2.6 m wide — fold your mirrors, honk politely, and inch through","The Cathedral Spires viewpoint just south of the tunnel","Sylvan Lake (5 min north) — the prettiest lake in the Black Hills, worth a 20-min stroll if you have gas in the tank"],"tips":["Drive it slowly and use the pull-outs — the road IS the attraction","Watch for mountain goats on the rocks around the tunnel — a small band lives there","RVs can't fit through the tunnel, which keeps this road blissfully quieter than Rushmore"],"fact":"Norbeck ordered the road built 'not for speed, but for scenery' and personally flagged the route on foot and horseback. Engineers wanted straight lines; he made them keep every curve."}},{"name":"Crazy Horse Memorial (optional)","lat":43.8366,"lng":-103.6238,"dur":"~1 h","note":"Visible from the highway viewpoint if skipping","optional":true,"guide":{"what":"The world's largest mountain carving in progress: a 172-metre sculpture of Lakota war leader Crazy Horse, begun in 1948 by sculptor Korczak Ziolkowski at the invitation of Lakota elder Henry Standing Bear — 'so the white man will know the red man has great heroes also.' The 27-metre face was finished in 1998; work continues on the horse's head.","see":["The mountain itself (viewable from the visitor complex ~1 km away)","The Indian Museum of North America — one of the best Native art collections anywhere","Korczak's studio-home and the 1:34 model showing the finished design"],"tips":["Entry is per vehicle (~$35) and NOT covered by any pass — it's a private nonprofit that has twice refused federal funding on principle","If you're short on time or budget: there's a decent free view of the mountain from a pullout on US-16/385 south of the entrance","When finished, all four Rushmore heads would fit inside Crazy Horse's head"],"fact":"Korczak died in 1982; his wife Ruth and seven of their ten children carried on. The family still runs it — no completion date has ever been announced, and they like it that way."}}],"stay":{"place":"Rapid City (2nd night)","cost":"~$140","lat":44.0805,"lng":-103.231},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Rapid+City%2C+SD&destination=Rapid+City%2C+SD&waypoints=Mount+Rushmore+National+Memorial%7CCuster+State+Park%7CNeedles+Highway"},{"n":4,"date":"2026-07-08","title":"Rapid City → Devils Tower → Cody, WY","tz":"America/Denver","mi":380,"drive":"~380 mi · 5.5–6 h","leaveBy":"8:00","leaveNote":"6 h of driving and the rodeo starts at 8pm sharp.","costs":{"stay":220,"food":75,"fuel":72,"extra":[["Rodeo ×2",50]]},"desc":"Walk the 2 km paved loop under Devils Tower (watch for climbers), then cross the Bighorn Mountains. Tonight: Cody Nite Rodeo, 8pm — bulls, broncos, pure Wyoming.","stops":[{"name":"Devils Tower","lat":44.5902,"lng":-104.7146,"when":"by noon","dur":"~1.5 h","note":"2 km paved Tower Trail loop","guide":{"what":"A 264-metre tower of fused volcanic columns punching out of the prairie — the neck of an ancient volcano whose softer surroundings eroded away, or (in the Kiowa telling) a tree stump raised by the Great Spirit to save seven sisters from a giant bear, whose claws scored the flutes down its sides. It became America's first national monument in 1906, personally proclaimed by Theodore Roosevelt.","see":["Tower Trail: the 2-km paved loop under the columns — each hexagonal column is up to 2.5 m wide, the largest example of columnar jointing on Earth","Climbers on the cracks — spot them for scale and the tower suddenly doubles in size","Prayer cloths and bundles tied to trees near the trail — this is an active sacred site for more than 20 tribes; look, don't touch","The prairie dog town by the entrance road"],"tips":["Covered by your parks pass","Allow ~1.5 h including the entrance road; the loop itself is 45 min","June is the voluntary climbing closure out of respect for tribal ceremonies — in July you'll likely see climbers again"],"fact":"This is the mothership from 'Close Encounters of the Third Kind' (1977) — Spielberg chose it because it already looked like it belonged to another world.","map":{"caption":"Park at the visitor center, walk the paved loop either way. The classic photo angle is the southwest corner; prayer bundles hang on the northeast side — look, don't touch.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><text x='120' y='22' font-size='10' fill='#5A6068'>spot climbers for scale<\/text><circle cx='175' cy='110' r='26' fill='#D9C4A3' stroke='#B98A56' stroke-width='2.5'/><line x1='165' y1='88' x2='165' y2='132' stroke='#B98A56' stroke-width='1.5'/><line x1='175' y1='85' x2='175' y2='135' stroke='#B98A56' stroke-width='1.5'/><line x1='185' y1='88' x2='185' y2='132' stroke='#B98A56' stroke-width='1.5'/><circle cx='175' cy='110' r='48' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='7 5'/><text x='210' y='150' font-size='10' fill='#8A6D00'>Tower Trail 2 km loop<\/text><text x='236' y='66' font-size='10' fill='#5A6068'>prayer bundles —<\/text><text x='236' y='78' font-size='10' fill='#5A6068'>please do not touch<\/text><text x='108' y='158' font-size='14'>📷<\/text><text x='42' y='172' font-size='10' fill='#B01E24' font-weight='700'>classic angle (SW)<\/text><circle cx='158' cy='176' r='2' fill='#9AA1A8'/><circle cx='168' cy='182' r='2.5' fill='#9AA1A8'/><circle cx='180' cy='177' r='2' fill='#9AA1A8'/><circle cx='190' cy='183' r='2.5' fill='#9AA1A8'/><text x='200' y='186' font-size='9.5' fill='#5A6068'>boulder field<\/text><rect x='56' y='192' width='52' height='20' rx='3' fill='#EEF2F8' stroke='#10437C' stroke-width='1.5'/><text x='64' y='206' font-size='11' fill='#10437C' font-weight='700'>🅿 + VC<\/text><path d='M96,190 C112,176 122,164 132,152' fill='none' stroke='#D69500' stroke-width='2.5' stroke-dasharray='5 4'/><path d='M110,214 C180,220 250,216 320,222' fill='none' stroke='#697077' stroke-width='5'/><text x='210' y='236' font-size='10' fill='#5A6068'>entrance rd — prairie dog town both sides<\/text><\/svg>"}}},{"name":"Shell Falls, Bighorn Mtns (US-14)","lat":44.5866,"lng":-107.539,"dur":"20 min","note":"Quick overlook on the pass","optional":true,"guide":{"what":"US-14 over the Bighorns climbs to 2,800 m through Shell Canyon, whose walls expose almost the entire geologic history of North America. Shell Falls drops 37 m over granite that is 2.5 billion years old — among the oldest exposed rock on the continent.","see":["The 5-minute paved overlook loop at the falls interpretive site","Layer-cake canyon walls on the drive up — you pass through 2.5 billion years in 30 km"],"tips":["It's a 20-minute stop with restrooms — perfect leg-stretch before the descent to Cody","Watch the truck's brakes on the way down the west side; use engine braking","Temperature drops ~10°C at the top — a taste of Yellowstone nights"],"fact":"You'll cross Granite Pass at 2,743 m — higher than anywhere the trip has taken you yet, and you're still two days from the Tetons."}},{"name":"Cody Nite Rodeo — 8pm","lat":44.523,"lng":-109.108,"when":"be seated 7:45pm","dur":"~2 h","note":"Tickets ~$25","guide":{"what":"Cody calls itself Rodeo Capital of the World and backs it up: the Nite Rodeo has run every summer night since 1938, the longest-running nightly rodeo anywhere. The town itself was founded in 1896 by Buffalo Bill Cody, the original global superstar — his Wild West show had already toured Europe twice before the town existed.","see":["Bareback and saddle bronc riding — the classic events, first hour","Bull riding — always the finale, always worth staying for","The kids' 'calf scramble' mid-show: every child in the stands invited into the arena to chase ribbons off calves"],"tips":["Be seated by 7:45pm; 'Buzzard's Roost' seats (west, above the chutes) are the connoisseur's pick — you see the animals loaded","Evenings run cool even in July — bring the fleece","If you're in town early tomorrow, the Buffalo Bill Center of the West (5 museums in one) is genuinely world-class — even 90 minutes helps you read Yellowstone better"],"fact":"Buffalo Bill performed for Queen Victoria, invented the concept of the touring arena show, and was probably the most famous person on Earth in 1900 — this town is his retirement project."}}],"stay":{"place":"Cody — splurge-ish rodeo town","cost":"~$220","lat":44.5263,"lng":-109.0565},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Rapid+City%2C+SD&destination=Cody%2C+WY&waypoints=Devils+Tower+National+Monument"}]},{"name":"Leg 2 · Yellowstone & Grand Teton","dates":"Jul 9 – 12","days":[{"n":5,"date":"2026-07-09","title":"Cody → Yellowstone East Side","tz":"America/Denver","mi":130,"mapLabel":"Yellowstone","drive":"~130 mi but a full sightseeing day","wx":"Days ~26°C · nights 5–8°C","leaveBy":"8:30","leaveNote":"Sightseeing starts at the East Entrance — everything after is slow scenic miles.","costs":{"stay":320,"food":85,"fuel":25},"desc":"Enter via the East Entrance — “the most scenic 50 miles in America.” Bison jams, elk, maybe wolves at dusk in Hayden Valley. Rent bear spray at Canyon Village if you plan any real hiking.","stops":[{"name":"Yellowstone East Entrance","lat":44.49,"lng":-110.005,"when":"~10am","note":"Show the parks pass","guide":{"what":"You're driving into the caldera of a supervolcano. Yellowstone last erupted 640,000 years ago with a force 1,000× Mount St. Helens; the 70-km-wide crater it left IS the park's central plateau, and the magma chamber below still powers every geyser you'll see. The East Entrance road over Sylvan Pass (2,600 m) was Teddy Roosevelt's favorite approach — 'the most scenic 50 miles in America.'","see":["Sylvan Pass — avalanche country, snow walls linger into July some years","First glimpse of Yellowstone Lake from the descent — pull over, everyone does"],"tips":["Show the parks pass + photo ID at the booth","Fill the tank in Cody before this — in-park gas exists but is pricey and sparse","From the gate to West Yellowstone is ~130 mi but budget the WHOLE day — 'bison jam' is not a metaphor","Cell signal dies at the gate; you downloaded offline maps, right?"],"fact":"The ground in the caldera breathes: GPS stations show it rising and falling several cm a year as magma shifts 8 km below your tires. Scientists watch it constantly; it is not due — 'overdue supervolcano' is tabloid myth."}},{"name":"Yellowstone Lake / Fishing Bridge","lat":44.5652,"lng":-110.373,"dur":"~45 min","guide":{"what":"North America's largest high-altitude lake: 350 km² of water at 2,357 m, average temperature 5°C even in July — survival time if you swim is under 30 minutes, which is why nobody does. Fishing Bridge was once THE place to catch cutthroat trout, shoulder-to-shoulder; fishing was banned in 1973 to save the spawning run, and the name stayed.","see":["Stand on Fishing Bridge and look down — native cutthroat trout still school over the gravel in July","Lake Hotel (1891), 10 min west: the oldest hotel in the park, string quartet in the lobby some evenings — walk in, it's free to gawk"],"tips":["The general store at Fishing Bridge is a good cold-drinks-and-restrooms stop","Steam rising from the water along the shore = underwater geothermal vents; the lake floor has its own geysers"],"fact":"Sonar mapping found a 30-m bulge on the lake floor that scientists monitor — the lake bottom is as geothermally alive as the geyser basins, just hidden."}},{"name":"Hayden Valley","lat":44.6598,"lng":-110.4682,"when":"late afternoon = wildlife","dur":"~1 h","note":"Bison jams — 25 m minimum distance","guide":{"what":"Hayden Valley is an old lakebed — the lake was once much bigger — and its clay soil won't grow trees, which is why it's a treeless savanna where you can see for kilometres. That visibility is why it's the best wildlife theatre in the lower 48: bison herds, elk, grizzlies on the far slopes, and the Wapiti Lake wolf pack.","see":["Bison herds doing exactly as they please, including using the road","Dawn/dusk: scan the far treelines with binoculars for wolves — reintroduced in 1995 after a 70-year absence, one of conservation's greatest comebacks","Grizzly Overlook (unofficial name, the big pullout mid-valley) — where the spotting-scope crowd gathers each evening; they'll usually let you look"],"tips":["25 m from bison and elk, 100 m from bears and wolves — these are legal minimums, rangers ticket for less","If a bison jam stops you, stay in the truck, shift to park, enjoy it — average delay 10–20 min","Late afternoon light + animals = your best wildlife photos of the trip; shoot from the window"],"fact":"When wolves returned in 1995, the elk stopped loitering in river valleys, willows and aspens regrew, beavers returned, and even the rivers changed shape. Ecologists call it a trophic cascade; you're driving through the textbook example.","map":{"caption":"The road shadows the river the whole valley. Use the pullouts — the mid-valley one is where the spotting-scope crowd gathers at dusk; they will usually share a look.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><path d='M120,18 C88,70 142,120 108,170 C96,196 116,225 118,232' fill='none' stroke='#8FB8D8' stroke-width='9' opacity='0.85'/><text x='16' y='36' font-size='10' fill='#5A6068'>Yellowstone River<\/text><path d='M205,14 C188,70 218,130 196,232' fill='none' stroke='#697077' stroke-width='6'/><text x='236' y='226' font-size='10' fill='#5A6068'>Grand Loop Rd<\/text><circle cx='198' cy='62' r='5' fill='#EEF2F8' stroke='#10437C' stroke-width='2'/><text x='212' y='66' font-size='10' fill='#22262A'>north pullouts<\/text><circle cx='208' cy='122' r='6' fill='#F5C518' stroke='#8A6D00' stroke-width='2'/><text x='222' y='118' font-size='10' fill='#22262A' font-weight='700'>⭐ mid-valley overlook<\/text><text x='222' y='130' font-size='9.5' fill='#5A6068'>scopes crowd at dusk 📷<\/text><circle cx='198' cy='182' r='5' fill='#EEF2F8' stroke='#10437C' stroke-width='2'/><text x='212' y='186' font-size='10' fill='#22262A'>south pullouts<\/text><text x='128' y='96' font-size='12'>🦬<\/text><text x='142' y='100' font-size='10' fill='#22262A'>herds cross here<\/text><circle cx='30' cy='128' r='7' fill='#B9CDB4'/><circle cx='46' cy='140' r='8' fill='#B9CDB4'/><circle cx='28' cy='152' r='7' fill='#B9CDB4'/><text x='16' y='176' font-size='10' fill='#5A6068'>wolves: far treeline,<\/text><text x='16' y='188' font-size='10' fill='#5A6068'>dawn/dusk, binoculars<\/text><text x='96' y='236' font-size='10' fill='#B01E24' font-weight='700'>⚠ pullouts only — never stop in the lane<\/text><\/svg>"}}},{"name":"Artist Point — Lower Falls","lat":44.72,"lng":-110.4794,"dur":"~1 h","note":"Grand Canyon of the Yellowstone","guide":{"what":"The Grand Canyon of the Yellowstone: 300 m deep, carved through rhyolite that hot acidic groundwater cooked soft and yellow — those mustard, rose and white walls are literally the 'yellow stone' the park is named for. The Lower Falls drop 94 m, twice Niagara's height.","see":["Artist Point itself — the postcard view up-canyon to the falls; Thomas Moran's 1872 painting from near here convinced Congress to invent the idea of a national park","Green stripe at the falls' lip — a notch of harder rock that stays deeper water","If knees allow: Uncle Tom's area viewpoints across the river on the way out"],"tips":["Late-afternoon light hits the canyon walls best — you're arriving at the right time","The viewpoint is 100 m from the parking lot — this one is effort-free","Osprey nest on the canyon spires most summers; scan the pinnacles"],"fact":"Moran's massive canvas of this canyon was bought by Congress for $10,000 and hung in the Capitol — the first landscape painting ever purchased by the US government, and the reason Yellowstone became the world's first national park six months later."}}],"stay":{"place":"West Yellowstone, MT — the splurge","cost":"~$320","lat":44.6621,"lng":-111.1041},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Cody%2C+WY&destination=West+Yellowstone%2C+MT&waypoints=Yellowstone+Lake%7CArtist+Point%2C+Yellowstone"},{"n":6,"date":"2026-07-10","title":"Yellowstone Geyser Day","tz":"America/Denver","mi":100,"drive":"Lower loop, ~100 mi in-park","leaveBy":"6:45","leaveNote":"Be through the West gate by 7:30am or queue behind every tour bus in Montana.","costs":{"stay":320,"food":85,"fuel":19},"desc":"Enter the park by 7:30am to beat crowds. Old Faithful erupts ~every 90 min — check predicted times at the visitor center.","stops":[{"name":"Old Faithful","lat":44.4605,"lng":-110.8281,"when":"first — check predicted times","dur":"~1.5 h","guide":{"what":"Not the biggest geyser, not the tallest — the most RELIABLE, which in geysers is the miracle. Old Faithful has erupted every 44 to 125 minutes for as long as records exist: superheated water at 118°C forced through a pressure-tight rock plumbing system that reloads like clockwork, 30–55 m high for 1.5–5 minutes.","see":["The eruption, obviously — but walk 10 min up Observation Point for the view above the crowd, or watch from the Inn's second-floor deck with a coffee","Old Faithful Inn (1904): the largest log building on Earth, its 23-m stone fireplace and gnarled-wood balconies built in a single winter — 15 minutes inside is mandatory","Predicted eruption times are posted at the visitor center and on signboards (±10 min)"],"tips":["Arrive 20 min before the predicted time for a front-row bench seat","While waiting for the next eruption, walk the Upper Geyser Basin boardwalk behind it — the densest concentration of geysers on the planet; Castle, Grand and Riverside are all more spectacular than Old Faithful if they happen to go","Cell signal exists here (barely) — check @GeyserNPS for Grand Geyser predictions if it loads"],"fact":"Early park visitors used Old Faithful as a laundry: clothes stuffed in the vent came back washed and hot-pressed by the next eruption. Wool, reportedly, was shredded.","map":{"caption":"Geyser, benches, and the two buildings that matter. If the next eruption is 45+ minutes out, walk the Upper Basin boardwalk or climb to Observation Point instead of standing around.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><circle cx='150' cy='112' r='9' fill='#8FB8D8' stroke='#10437C' stroke-width='2'/><path d='M146,98 C144,90 152,88 150,80 M154,98 C156,90 148,86 152,78' stroke='#9AA1A8' stroke-width='2' fill='none'/><text x='108' y='134' font-size='10.5' fill='#22262A' font-weight='700'>Old Faithful<\/text><path d='M104,152 Q150,172 196,152' fill='none' stroke='#697077' stroke-width='3' stroke-dasharray='2 5'/><text x='120' y='186' font-size='10' fill='#5A6068'>benches — sit 20 min early<\/text><rect x='214' y='158' width='54' height='18' rx='2' fill='#fff' stroke='#23272B' stroke-width='1.5'/><text x='218' y='170' font-size='9' fill='#22262A'>VISITOR CTR<\/text><text x='214' y='190' font-size='9.5' fill='#8A6D00' font-weight='700'>⭐ predicted times board<\/text><rect x='52' y='158' width='48' height='18' rx='2' fill='#fff' stroke='#23272B' stroke-width='1.5'/><text x='58' y='170' font-size='9' fill='#22262A'>THE INN<\/text><text x='30' y='190' font-size='9.5' fill='#8A6D00' font-weight='700'>⭐ 1904 log lobby — go in<\/text><path d='M196,140 C226,124 248,104 262,88' fill='none' stroke='#D69500' stroke-width='2.5' stroke-dasharray='6 4'/><text x='266' y='82' font-size='13'>📷<\/text><text x='224' y='70' font-size='10' fill='#22262A'>Observation Pt (10 min up)<\/text><path d='M148,100 C138,72 146,50 168,34' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='7 5'/><text x='178' y='34' font-size='10' fill='#8A6D00'>Upper Basin boardwalk ▸<\/text><text x='178' y='46' font-size='9.5' fill='#5A6068'>Castle · Grand · Riverside geysers<\/text><rect x='128' y='204' width='84' height='18' rx='3' fill='#EEF2F8' stroke='#10437C' stroke-width='1.5'/><text x='152' y='217' font-size='11' fill='#10437C' font-weight='700'>🅿 big lots<\/text><\/svg>"}}},{"name":"Fairy Falls TH — Grand Prismatic Overlook","lat":44.5157,"lng":-110.8327,"dur":"~1.5 h round trip","note":"THE photo — 1.6 km walk to the overlook","guide":{"what":"Grand Prismatic is the largest hot spring in the US, third on Earth: 110 m across, deeper than a 10-storey building, and colored like a gas flame — sterile 87°C blue at the center, ringed in yellow, orange and rust by mats of heat-loving microbes, each ring a different species tuned to a different temperature.","see":["The Overlook: from Fairy Falls trailhead, walk 1.2 km of flat trail then a short climb to the platform — THIS is the aerial photo you've seen; from ground level it's just steam","The microbial mats up close afterwards (optional): drive 2 min north to Midway Geyser Basin and walk the boardwalk past Excelsior Geyser's 55,000-litre-per-minute boiling outflow into the river"],"tips":["Do the overlook FIRST from Fairy Falls TH — most crowds only do the boardwalk","Morning is best: cool air = more steam at ground level but the overlook still reads the colors; midday has least steam if you want maximum color","The trailhead lot fills by ~9:30am — another argument for your early start"],"fact":"The microbes painting those orange rings — thermophiles — were unknown to science until Yellowstone. One of them, Thermus aquaticus, gave us the enzyme behind the PCR test; every COVID test ever run traces back to this pool's cousins.","map":{"caption":"TWO different parking lots. The aerial view everyone wants is the Overlook — from the Fairy Falls lot, not the boardwalk lot. Do the Overlook first, then decide if you want the close-up steam.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><text x='96' y='22' font-size='11' fill='#B01E24' font-weight='700'>⚠ two different parking lots!<\/text><path d='M60,30 V230' stroke='#697077' stroke-width='7'/><text x='16' y='136' font-size='10' fill='#5A6068' transform='rotate(-90 22 136)'>Grand Loop Rd<\/text><rect x='78' y='48' width='44' height='18' rx='3' fill='#EEF2F8' stroke='#10437C' stroke-width='1.5'/><text x='84' y='61' font-size='10' fill='#10437C' font-weight='700'>🅿 Midway<\/text><path d='M122,58 C150,60 168,66 182,74' fill='none' stroke='#D69500' stroke-width='2.5' stroke-dasharray='5 4'/><circle cx='210' cy='84' r='26' fill='#E5A400'/><circle cx='210' cy='84' r='16' fill='#2E86C1'/><text x='244' y='78' font-size='10' fill='#22262A'>Grand Prismatic<\/text><text x='244' y='90' font-size='9.5' fill='#5A6068'>boardwalk = up close, steamy<\/text><circle cx='168' cy='108' r='8' fill='#8FB8D8'/><text x='150' y='128' font-size='9.5' fill='#5A6068'>Excelsior crater<\/text><rect x='78' y='168' width='44' height='18' rx='3' fill='#EEF2F8' stroke='#10437C' stroke-width='1.5'/><text x='80' y='181' font-size='9.5' fill='#10437C' font-weight='700'>🅿 Fairy Falls<\/text><path d='M122,178 C170,182 208,180 228,168 C244,158 252,146 256,134' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='7 5'/><text x='150' y='200' font-size='10' fill='#8A6D00'>flat 1.2 km, then short climb<\/text><text x='260' y='126' font-size='14'>📷<\/text><text x='236' y='112' font-size='10.5' fill='#22262A' font-weight='700'>⭐ THE Overlook view<\/text><text x='84' y='224' font-size='9.5' fill='#B01E24'>lot fills ~9:30am<\/text><\/svg>"}}},{"name":"Fountain Paint Pot","lat":44.5497,"lng":-110.8072,"dur":"45 min","guide":{"what":"The one boardwalk with all four geothermal feature types in 800 m: geysers (erupting water), hot springs (still water), fumaroles (steam vents screaming through cracks), and mudpots — acid pools that dissolve rock into gurgling clay soup.","see":["The mudpots mid-loop — early summer they're thick and blooping like a cartoon cauldron","Clepsydra Geyser near the exit: it erupts almost constantly, your guaranteed geyser photo","Dead lodgepole 'bobby-sock trees' — killed by shifting hot ground, white ankles of absorbed silica"],"tips":["30–45 min, flat and easy — a perfect between-basins stop","Stay ON the boardwalk everywhere in this park: the crust beside it can be centimetres thick over boiling water; people and animals have died proving that"],"fact":"The paint pots' colors come from minerals: iron oxides tint the clay pink and grey. Early visitors genuinely used the mud as paint — hence the name."}},{"name":"Norris Geyser Basin","lat":44.7264,"lng":-110.703,"dur":"~1.5 h","guide":{"what":"The hottest, oldest and most volatile thermal basin in the park — 115,000 years of activity, ground temperatures just below boiling, and water so acidic it dissolves boardwalk nails. Norris sits on the intersection of three fault lines; everything here changes year to year, sometimes overnight.","see":["Porcelain Basin: a milky-blue mineral plain hissing with dozens of vents — the most alien landscape in Yellowstone","Steamboat Geyser: the tallest active geyser on Earth (90–120 m, three times Old Faithful). Eruptions are totally unpredictable — but even its constant minor spitting is worth the walk","Echinus Geyser: the largest acid geyser known, pH of vinegar"],"tips":["Do Porcelain Basin loop (30 min) if tired, both loops (1.5 h) if not","This is your last basin — by now you can read them: blue = hottest, orange = cooler microbes, clear = acid","Afternoon here then exit via Madison to West Yellowstone — bison herds often line the Madison River in evening light"],"fact":"When Steamboat does fully erupt, it rains sand and rock chips on the parking lot and cars need washing. Owners of wet cars are considered lottery winners — some people chase this geyser for years.","map":{"caption":"Two loops from the museum: Porcelain (short, alien, essential) and Back Basin (longer, holds Steamboat). Tired legs do Porcelain only and lose little.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><rect x='142' y='26' width='56' height='18' rx='2' fill='#fff' stroke='#23272B' stroke-width='1.5'/><text x='148' y='39' font-size='9' fill='#22262A'>MUSEUM + 🅿<\/text><ellipse cx='238' cy='122' rx='56' ry='46' fill='#EAF2F8'/><ellipse cx='238' cy='122' rx='56' ry='46' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='7 5'/><path d='M196,44 C210,58 222,68 230,78' fill='none' stroke='#D69500' stroke-width='2.5' stroke-dasharray='5 4'/><text x='212' y='118' font-size='10.5' fill='#22262A' font-weight='700'>⭐ Porcelain Basin<\/text><text x='216' y='131' font-size='9.5' fill='#5A6068'>30 min · milky blue<\/text><ellipse cx='100' cy='146' rx='72' ry='60' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='7 5'/><path d='M148,44 C132,60 118,74 110,88' fill='none' stroke='#D69500' stroke-width='2.5' stroke-dasharray='5 4'/><text x='72' y='140' font-size='10.5' fill='#22262A' font-weight='700'>Back Basin ~1.5 h<\/text><text x='34' y='112' font-size='12'>⭐<\/text><text x='48' y='116' font-size='10' fill='#22262A'>Steamboat —<\/text><text x='48' y='128' font-size='9.5' fill='#5A6068'>tallest on Earth<\/text><text x='96' y='196' font-size='9.5' fill='#5A6068'>Echinus (acid geyser)<\/text><text x='190' y='218' font-size='10' fill='#B01E24' font-weight='700'>⚠ boardwalk only — thin crust<\/text><\/svg>"}}}],"stay":{"place":"West Yellowstone (2nd night)","cost":"~$320","lat":44.6621,"lng":-111.1041},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=West+Yellowstone%2C+MT&destination=West+Yellowstone%2C+MT&waypoints=Old+Faithful%7CGrand+Prismatic+Spring%7CNorris+Geyser+Basin"},{"n":7,"date":"2026-07-11","title":"Yellowstone → Grand Teton → Jackson","tz":"America/Denver","mi":120,"drive":"~120 mi · relaxed","leaveBy":"9:00","leaveNote":"Relaxed day — West Thumb first, then south to the Tetons.","costs":{"stay":240,"food":95,"fuel":23},"desc":"West Thumb's geysers sit right on the lake shore — directly on your way south. Then the Teton range appears like a wall.","stops":[{"name":"West Thumb Geyser Basin","lat":44.4166,"lng":-110.5732,"when":"~9:30am","dur":"45 min","note":"Geysers on the shore of Yellowstone Lake — zero detour","guide":{"what":"A geyser basin INSIDE the lake: West Thumb is a caldera-within-the-caldera, a smaller volcanic explosion 174,000 years ago that the lake flooded. Hot springs boil straight up through the cold lake floor along the shore — the collision of the two worlds is the whole show.","see":["Fishing Cone: a geyser cone poking out of the lake — 1870s anglers stood on it, caught trout, and cooked them in the vent without moving ('hook and cook'); banned now, legendary forever","Abyss Pool: 16 m deep, the color of the deep end of the universe","Black Pool: no longer black — it cooked its dark microbes in a 1991 heat surge and turned impossible turquoise"],"tips":["45 min, flat boardwalk, right on your route south — the perfect goodbye to Yellowstone","Morning light on the lake + steam = your best photos here","Elk graze the basin edges most mornings"],"fact":"The lake bottom just offshore has its own geysers and hot vents — kayak tours float over them; the water is 5°C on top and boiling 3 m down.","map":{"caption":"A shoreline boardwalk loop where the basin boils into the lake. Fishing Cone is right on the waterline — morning steam makes the photo.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><path d='M232,14 L336,14 L336,230 L232,230 C214,160 214,86 232,14 Z' fill='#CFE3F2' stroke='#8FB8D8' stroke-width='2'/><text x='252' y='118' font-size='10' fill='#5A6068'>Yellowstone Lake<\/text><rect x='42' y='104' width='44' height='18' rx='3' fill='#EEF2F8' stroke='#10437C' stroke-width='1.5'/><text x='54' y='117' font-size='11' fill='#10437C' font-weight='700'>🅿<\/text><path d='M86,112 C104,112 112,112 120,112' stroke='#D69500' stroke-width='2.5' stroke-dasharray='5 4' fill='none'/><path d='M120,70 H210 C224,86 226,150 212,172 H124 C112,150 110,92 120,70 Z' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='7 5'/><circle cx='152' cy='78' r='8' fill='#1F618D'/><text x='118' y='60' font-size='10' fill='#22262A' font-weight='700'>⭐ Abyss Pool<\/text><circle cx='192' cy='96' r='7' fill='#48C9B0'/><text x='204' y='92' font-size='10' fill='#22262A'>Black Pool<\/text><circle cx='222' cy='142' r='6' fill='#D9C4A3' stroke='#B98A56' stroke-width='2'/><text x='240' y='140' font-size='13'>📷<\/text><text x='240' y='156' font-size='10' fill='#22262A' font-weight='700'>Fishing Cone<\/text><text x='240' y='168' font-size='9.5' fill='#5A6068'>hook + cook, 1870s<\/text><text x='60' y='210' font-size='10' fill='#5A6068'>elk graze the basin edge most mornings<\/text><\/svg>"}}},{"name":"Snake River Overlook","lat":43.7328,"lng":-110.6737,"dur":"15 min","note":"The Ansel Adams shot","guide":{"what":"In 1942 Ansel Adams stood roughly here and made 'The Tetons and the Snake River' — one of the most reproduced landscape photographs ever taken; it's aboard both Voyager spacecraft as a message to whoever finds them. The Tetons are the youngest range in the Rockies (10 million years, still rising) with no foothills — they simply detonate 2,100 m out of the valley floor along a fault.","see":["The river bend + full range panorama — pines have grown since 1942, so Adams' exact frame is gone, but the sweep is intact","Grand Teton (4,199 m) — the sharp one; Mount Moran to the right with the black basalt dike running up its face like a zipper"],"tips":["15-minute stop; morning is best — the range faces east and lights up front-on","Haze from distant fires is common in July; it makes sunsets better and midday flatter"],"fact":"'Teton' is what lonely French trappers named these peaks — 'les Trois Tétons,' the three breasts. The Shoshone name, Teewinot, 'many pinnacles,' was better, but the French wrote the maps."}},{"name":"Mormon Row barns","lat":43.66,"lng":-110.665,"dur":"30 min","note":"Most-photographed barn in America","guide":{"what":"Two rows of 1890s homesteads built by Mormon settlers who came north from Idaho, aligned along a central lane per Brigham Young's town-planning doctrine. The T.A. Moulton barn — the gambrel-roofed one with the full Teton wall behind it — is routinely called the most photographed barn in America.","see":["T.A. Moulton barn (south row) — THE photo; his brother John's barn (north row, by the pink stucco house) is the other one","Pronghorn and bison herds graze the flats here most mornings","The old irrigation ditches and lilac bushes — 130-year-old landscaping still outliving its planters"],"tips":["30 min; the dirt road is fine for the truck","Photographers swarm at dawn; late morning you'll have it nearly alone (light's still good — the barns face east)"],"fact":"It took T.A. Moulton 30 years to finish his barn. It has now been famous for longer than it was ever used for hay.","map":{"caption":"Two barn clusters on one dirt lane. The famous one is T.A. Moulton's, the south barn — shoot facing west so the Tetons fill the sky behind it.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><path d='M10,62 H330' stroke='#697077' stroke-width='5'/><text x='226' y='52' font-size='10' fill='#5A6068'>Antelope Flats Rd<\/text><text x='16' y='52' font-size='10' fill='#00693C' font-weight='700'>◂ from US-191<\/text><path d='M170,62 V222' stroke='#B98A56' stroke-width='4' stroke-dasharray='10 6'/><text x='178' y='218' font-size='10' fill='#5A6068'>dirt lane (truck fine)<\/text><rect x='146' y='92' width='16' height='12' fill='#fff' stroke='#23272B' stroke-width='1.5'/><rect x='186' y='90' width='12' height='10' fill='#E8B4B8' stroke='#23272B' stroke-width='1'/><text x='206' y='100' font-size='10' fill='#22262A'>John Moulton barn + pink house<\/text><circle cx='178' cy='108' r='4' fill='#EEF2F8' stroke='#10437C' stroke-width='1.5'/><rect x='146' y='168' width='16' height='12' fill='#fff' stroke='#23272B' stroke-width='1.5'/><text x='120' y='178' font-size='13'>📷<\/text><text x='206' y='172' font-size='10.5' fill='#22262A' font-weight='700'>⭐ T.A. Moulton barn<\/text><text x='206' y='184' font-size='9.5' fill='#5A6068'>THE photo — face west<\/text><circle cx='178' cy='188' r='4' fill='#EEF2F8' stroke='#10437C' stroke-width='1.5'/><polyline points='14,150 26,132 38,148 50,128 62,146' fill='none' stroke='#B98A56' stroke-width='2.5'/><text x='14' y='168' font-size='10' fill='#5A6068'>◂ Tetons this way<\/text><text x='40' y='226' font-size='10' fill='#5A6068'>pronghorn + bison in the flats at dawn<\/text><\/svg>"}}},{"name":"Jackson Town Square","lat":43.4799,"lng":-110.7624,"when":"evening stroll","note":"Elk-antler arches","guide":{"what":"Jackson's town square is framed by four arches built entirely of elk antlers — about 2,000 antlers each, 14 tonnes of them, collected since 1953 by Boy Scouts from the National Elk Refuge just north of town, where up to 10,000 elk winter. Elk shed antlers annually; nobody is harmed except aesthetically.","see":["The four antler arches (best photo: northeast corner at dusk when the string lights come on)","The Town Square 'Shootout' — a gloriously hammy Old West gunfight staged most summer evenings around 6pm (skip guilt-free if timing is off)","Million Dollar Cowboy Bar across the street: saddles for bar stools, live country, tourists and actual ranch hands in the same room"],"tips":["Parking is tight; the free public garage a block north usually has space","Dinner here is your splurge-adjacent option; Victor, ID (if that's your bed) has the excellent Knotty Pine for half the price","Gas up tonight — tomorrow starts early"],"fact":"The scouts auction surplus antlers on the square each May; a single matched pair from a big bull can fetch over $1,000, and the money funds the refuge that feeds the elk that grow next year's arches."}}],"stay":{"place":"Jackson (~$300) or Victor, ID (~$180)","cost":"$180–300","lat":43.4799,"lng":-110.7624},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=West+Yellowstone%2C+MT&destination=Jackson%2C+WY&waypoints=West+Thumb+Geyser+Basin%7CSnake+River+Overlook%7CMormon+Row+Historic+District"},{"n":8,"date":"2026-07-12","title":"Jenny Lake → Salt Lake City","tz":"America/Denver","mi":280,"mapLabel":"SLC","drive":"~280 mi · 4.5 h (afternoon)","leaveBy":"7:00","leaveNote":"First Jenny Lake boats ~7am; hike done before the 1pm drive to SLC.","costs":{"stay":130,"food":75,"fuel":53,"extra":[["Jenny Lake boat ×2",24]]},"desc":"Morning: boat shuttle across Jenny Lake (~$12) + the short hike to Hidden Falls & Inspiration Point. Leave ~1pm for Salt Lake City.","stops":[{"name":"Jenny Lake Visitor Center","lat":43.7512,"lng":-110.7224,"when":"first boats ~7am","dur":"~3 h with hike","note":"Boat shuttle ~$12 → Hidden Falls & Inspiration Point","guide":{"what":"Jenny Lake fills a bowl that a glacier gouged directly at the foot of the steepest face of the Tetons — 130 m deep, absurdly clear, and the front door to the range's best short hike. The boat shuttle across (running since the 1950s) saves you 3.5 km of shoreline walking each way and is a highlight itself.","see":["Hidden Falls: 60 m of whitewater 800 m from the west boat dock — an easy walk in cathedral forest","Inspiration Point: 1 km further, 120 m above the lake — the whole valley (Jackson Hole) laid out below, with the lake like poured glass","If legs are fresh: even 1 km into Cascade Canyon beyond the point is the best-value alpine scenery of the entire trip — moose live in the willows there"],"tips":["First boats ~7am, every 10–15 min, ~$12/person round trip, card only — be on an early one, the trail is a conveyor belt by 10","This is grizzly country for real: talk as you walk (they avoid noisy humans); bear spray is rentable in Jackson if you want it","Water and sunscreen — the climb to Inspiration Point is short but honest","Be back at the truck by ~12:30 for the drive to SLC"],"fact":"The lake is named for Jenny Leigh, a Shoshone woman married to English trapper 'Beaver Dick' Leigh — she guided the 1872 Hayden survey that mapped this valley. She and all six children died of smallpox four years later; the loveliest lake in the Rockies is her monument.","map":{"caption":"Boat across, then it's a short climb: falls first, viewpoint above. The shore trail back is only if you miss the last boat — check return times at the dock.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><polyline points='12,30 22,60 12,92 24,124 12,156 22,188 14,214' fill='none' stroke='#B98A56' stroke-width='3'/><ellipse cx='158' cy='118' rx='92' ry='74' fill='#CFE3F2' stroke='#8FB8D8' stroke-width='2'/><text x='134' y='70' font-size='10' fill='#5A6068'>Jenny Lake<\/text><rect x='268' y='96' width='58' height='30'
