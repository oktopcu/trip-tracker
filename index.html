rx='3' fill='#EEF2F8' stroke='#10437C' stroke-width='1.5'/><text x='274' y='109' font-size='9.5' fill='#10437C' font-weight='700'>🅿 + VC<\/text><text x='274' y='120' font-size='8.5' fill='#10437C'>arrive 6:45am<\/text><circle cx='250' cy='122' r='5' fill='#fff' stroke='#23272B' stroke-width='2'/><text x='240' y='142' font-size='9.5' fill='#22262A'>east dock<\/text><path d='M244,120 C196,128 122,128 74,120' fill='none' stroke='#10437C' stroke-width='2.5' stroke-dasharray='4 5'/><text x='128' y='144' font-size='9.5' fill='#10437C'>boat 10–15 min · ~$12<\/text><circle cx='70' cy='118' r='5' fill='#fff' stroke='#23272B' stroke-width='2'/><path d='M66,122 C56,136 50,146 46,156' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='6 4'/><text x='30' y='172' font-size='12'>⭐<\/text><text x='44' y='176' font-size='10' fill='#22262A' font-weight='700'>Hidden Falls (0.8 km)<\/text><path d='M46,152 C34,132 34,110 44,94' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='6 4'/><text x='48' y='86' font-size='13'>📷<\/text><text x='62' y='90' font-size='10' fill='#22262A' font-weight='700'>Inspiration Pt<\/text><path d='M42,90 C34,80 28,74 20,68' fill='none' stroke='#D69500' stroke-width='2' stroke-dasharray='3 4'/><text x='30' y='56' font-size='9.5' fill='#5A6068'>▴ Cascade Canyon — moose<\/text><text x='150' y='226' font-size='9.5' fill='#5A6068'>grizzly country: make noise on the trail<\/text><\/svg>"}}},{"name":"Salt Lake City","lat":40.7608,"lng":-111.891,"when":"arrive ~6pm","note":"Cheap recovery night","guide":{"what":"Recovery night in the Crossroads of the West. SLC sits between the Wasatch Front and the Great Salt Lake, 1,300 m up — founded in 1847 by Brigham Young and 148 pioneers as a refuge 1,000 km from anywhere, planned from day one on a grid whose streets are numbered by distance from the temple.","see":["Nothing mandatory tonight — that's the point. Eat something that isn't road food","If restless: the State Capitol at dusk has the best free view over the valley"],"tips":["Hotels near downtown/Temple Square put tomorrow's stroll on foot","Grocery stores are everywhere and huge — restock the cooler tonight or tomorrow morning","Utah quirk: beer over 5% is state-store only; restaurants pour full-strength with food"],"fact":"The street grid's addresses ('300 South 200 East') are coordinates — locals navigate the whole city by mental math from the temple's front door."}}],"stay":{"place":"Salt Lake City — cheap recovery night","cost":"~$130","lat":40.7608,"lng":-111.891},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Jackson%2C+WY&destination=Salt+Lake+City%2C+UT&waypoints=Jenny+Lake+Visitor+Center"}]},{"name":"Leg 3 · Red Rock, Vegas & Los Angeles","dates":"Jul 13 – 19","days":[{"n":9,"date":"2026-07-13","title":"SLC → Bryce Canyon Country","tz":"America/Denver","mi":270,"drive":"~270 mi · 4 h","rest":"Laundry + resupply morning","leaveBy":"9:30","leaveNote":"Laundry + resupply morning — a genuinely slow start.","costs":{"stay":180,"food":70,"fuel":51},"desc":"Slow morning: Temple Square walk, laundry, restock the cooler. Afternoon drive south into red-rock country.","stops":[{"name":"Temple Square","lat":40.7707,"lng":-111.8912,"dur":"~1 h","note":"Morning walk","guide":{"what":"The 10-acre headquarters of the Latter-day Saints and the reason this city exists. The granite Salt Lake Temple took 40 years to build (1853–1893) — ox-drawn granite blocks, 30 km from the quarry. Non-members can't enter temples, but the grounds, the Tabernacle and the visitor centers are open and genuinely welcoming.","see":["The Tabernacle (1867): a wooden dome built without nails, acoustics so perfect a pin dropped at the pulpit is audible 50 m back — organists demonstrate at noon most days on the 11,623-pipe organ","The temple exterior — note the long-running seismic renovation; scaffolding may still wrap parts of it","The Beehive House and Eagle Gate a block east — Brigham Young's 1854 home"],"tips":["An hour is right; guides (young missionaries from everywhere on Earth) offer free tours — take one or politely decline, both are fine","City Creek Center across the street: A/C, food court, and a creek running through a shopping mall","Then laundry, cooler restock, fuel — the boring hour that buys you a smooth desert week"],"fact":"The temple's foundation was buried and hidden for years during a federal standoff in 1858 — when dug up, the sandstone had cracked, so they restarted in granite. Hence 40 years."}},{"name":"Bryce — Sunset Point (if arrived by 8pm)","lat":37.6216,"lng":-112.167,"when":"if there by 8pm","note":"Sunset peek at the rim","optional":true,"guide":{"what":"If you roll in before dark, this is your teaser: Bryce Canyon's rim at 2,400 m, looking down into the Silent City — thousands of stone spires glowing orange in the last light. Full immersion is tomorrow at dawn; tonight is just the trailer.","see":["The Silent City from the rim rail — the densest hoodoo field on Earth","Thor's Hammer silhouetted at last light"],"tips":["You're at 2,400 m now — expect to feel the stairs and bring the fleece; it can drop near 5°C at night even in July","If you miss the light, skip it — sunrise tomorrow is the main event and it's better"],"fact":"Bryce has some of the darkest night skies in the lower 48 — if you step out late tonight, the Milky Way is a structure, not a smudge."}}],"stay":{"place":"Bryce Canyon City / Panguitch","cost":"~$180","lat":37.6739,"lng":-112.1567},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Salt+Lake+City%2C+UT&destination=Bryce+Canyon+City%2C+UT"},{"n":10,"date":"2026-07-14","title":"Bryce Sunrise → Zion Gateway","tz":"America/Denver","mi":85,"drive":"~85 mi · 2 h scenic","wx":"Bryce ~27°C (2,500 m altitude!)","leaveBy":"5:45","leaveNote":"Sunrise Point is the whole point — hoodoos glow ~6:15am, hike before the heat.","costs":{"stay":280,"food":90,"fuel":16},"desc":"Sunrise Point at dawn (hoodoos glow orange), then the Queen's Garden → Navajo Loop combo — 4.6 km, the best short hike in Utah. Afternoon: Hwy 89 → the Zion–Mt Carmel tunnel into Springdale.","stops":[{"name":"Bryce — Sunrise Point (dawn!)","lat":37.6282,"lng":-112.1621,"when":"first light ~6:15am","dur":"30 min","note":"Hoodoos glow orange","guide":{"what":"Bryce isn't a canyon — it's the eroding edge of a plateau, retreating amphitheater by amphitheater. Hoodoos form because this limestone freezes and thaws 200 nights a year: water wedges cracks open by day, ice pries them wider by night, and acid rain melts the glue between layers. Sunrise Point at dawn is the single best light show of your entire trip.","see":["First light hitting the Silent City — the hoodoos ignite orange-pink from the top down, over about 20 minutes","The 'windows' in the fins — hoodoos being born; a fin becomes windows becomes spires","Look east: on clear mornings you can see 150+ km to Navajo Mountain"],"tips":["Be on the rim 15 min before the posted sunrise (~6:10am) — the pre-light color is half the show","It is COLD at 2,400 m at dawn, even mid-July: full fleece, hat if you have one, coffee in a thermos","The rim path between Sunrise and Sunset Points is flat — wander it while the light works"],"fact":"Paiute tradition holds the hoodoos are the Legend People, turned to stone by Coyote for their misdeeds — the rows of red figures at dawn make it obvious why. The Paiute name means 'red rocks standing like men in a bowl-shaped canyon.'"}},{"name":"Queen's Garden / Navajo Loop (Sunset Point)","lat":37.6216,"lng":-112.167,"when":"before 8am","dur":"~2.5 h","note":"4.6 km combo hike — do it before the heat","guide":{"what":"The best short hike in Utah, official: descend among the hoodoos via Queen's Garden, come back up through Navajo Loop's slot — 4.6 km total, 180 m down and up. Down in the maze the spires tower 20 storeys over you and the silence is total.","see":["Queen Victoria hoodoo (the trail's namesake — she's there, in profile, riding side-saddle)","Wall Street: the Navajo Loop's finale — a slot canyon with 200-year-old Douglas firs growing in the crack, reaching for a ribbon of sky","Thor's Hammer up close from the Navajo switchbacks"],"tips":["Direction matters: DOWN Queen's Garden (from Sunrise Point), UP Wall Street (to Sunset Point), then the flat rim path back — gentler descent, dramatic exit","Start by 7am: shade, cool air, empty trail; by 10am it's a hot conga line","2,400 m altitude — you'll puff on the climb out; that's the elevation, not your fitness","1 L of water each minimum; there's none below the rim"],"fact":"The whole plateau retreats about 1–4 m per century. The rim you stand on this morning will not exist in a few thousand years — Bryce is the most temporary-feeling permanent thing you'll ever see.","map":{"caption":"Down the gentle way, up the dramatic way: descend Queen's Garden from Sunrise Point, cross the amphitheater floor, climb out through Wall Street to Sunset Point, stroll the flat rim back.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><path d='M20,55 H320' stroke='#B98A56' stroke-width='3'/><path d='M20,55 H320 L320,230 L20,230 Z' fill='#FAF0E4' opacity='0.6'/><circle cx='272' cy='55' r='5' fill='#00693C'/><text x='222' y='40' font-size='10.5' fill='#00693C' font-weight='700'>Sunrise Pt — START<\/text><circle cx='84' cy='55' r='5' fill='#B01E24'/><text x='48' y='40' font-size='10.5' fill='#22262A' font-weight='700'>Sunset Pt — finish<\/text><path d='M110,30 H240' stroke='#D69500' stroke-width='2' stroke-dasharray='4 4'/><text x='124' y='24' font-size='9.5' fill='#8A6D00'>◂ flat rim stroll back (0.8 km)<\/text><path d='M272,60 C254,92 236,118 214,142' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='7 5'/><text x='256' y='104' font-size='10' fill='#8A6D00'>▾ down<\/text><text x='196' y='158' font-size='12'>⭐<\/text><text x='150' y='172' font-size='10' fill='#22262A'>Queen Victoria hoodoo<\/text><path d='M208,148 C186,160 162,164 148,160' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='7 5'/><path d='M148,160 C124,142 106,104 90,62' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='7 5'/><text x='112' y='128' font-size='10' fill='#8A6D00'>▴ up<\/text><line x1='96' y1='96' x2='108' y2='92' stroke='#B98A56' stroke-width='2.5'/><line x1='92' y1='84' x2='104' y2='80' stroke='#B98A56' stroke-width='2.5'/><text x='116' y='88' font-size='10' fill='#22262A' font-weight='700'>⭐ Wall Street slot<\/text><text x='96' y='68' font-size='13'>📷<\/text><text x='108' y='70' font-size='9.5' fill='#5A6068'>Thor's Hammer<\/text><line x1='236' y1='186' x2='236' y2='200' stroke='#B98A56' stroke-width='3'/><line x1='246' y1='182' x2='246' y2='200' stroke='#B98A56' stroke-width='3'/><line x1='256' y1='188' x2='256' y2='200' stroke='#B98A56' stroke-width='3'/><line x1='150' y1='190' x2='150' y2='204' stroke='#B98A56' stroke-width='3'/><line x1='160' y1='186' x2='160' y2='204' stroke='#B98A56' stroke-width='3'/><text x='104' y='224' font-size='10' fill='#5A6068'>4.6 km · 180 m down/up · start by 7am<\/text><\/svg>"}}},{"name":"Zion–Mt Carmel Tunnel","lat":37.213,"lng":-112.94,"when":"afternoon","note":"1.1-mile 1930 tunnel — lights on","guide":{"what":"The 1.7-km Zion–Mt Carmel tunnel (1930) was the engineering marvel of its day — blasted through a sheer sandstone cliff, with gallery windows cut sideways so drivers could dump rubble during construction and passengers could peek after. The switchbacks below it drop you into Zion Canyon like a landing airplane.","see":["Checkerboard Mesa just before the tunnel — sandstone crosshatched by ancient dune layers and modern frost cracks","The gallery windows flashing canyon views as you drive the tunnel (passenger's job)","Bighorn sheep on the slickrock east of the tunnel — this stretch is the best odds in Utah"],"tips":["Your pickup fits fine (oversize vehicles need a paid escort; you're not one)","Headlights on, sunglasses off — it's genuinely dark inside","Pullouts after the switchbacks are worth one stop for the Great Arch view back up"],"fact":"When it opened in 1930 it was the longest road tunnel in America, and the road it completed (the 'road to nowhere,' critics said) is why Zion went from 4,000 visitors a year to 5 million."}},{"name":"Springdale","lat":37.1889,"lng":-112.9988,"guide":{"what":"Springdale is a one-street town wedged between 600-m sandstone walls — the entire town is inside the canyon's mouth. Tonight it has one job for you: Narrows gear.","see":["The Watchman peak glowing red over town at sunset — shoot it from the Canyon Junction bridge if you're feeling it","Gallery-and-gear row along Zion Park Blvd"],"tips":["Rent Narrows packages TONIGHT (canyoneering boots + neoprene socks + wooden staff, ~$30/person): Zion Outfitter, Zion Adventures and others are open till 8–9pm; pickup tonight = you make the first shuttle tomorrow","Ask the shop for tomorrow's flash-flood rating and water flow (CFS) while you're there — they post it daily","Buy tomorrow's lunch tonight; nothing is open at 5:30am"],"fact":"Springdale's permanent population is about 500; on a July day 15,000+ people move through it. The town shuttle exists because the traffic once backed up 5 km into the desert."}}],"stay":{"place":"Springdale — splurge #2","cost":"~$280","lat":37.1889,"lng":-112.9988},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Bryce+Canyon+National+Park&destination=Springdale%2C+UT"},{"n":11,"date":"2026-07-15","title":"Zion — Hike the Narrows","tz":"America/Denver","mi":10,"mapLabel":"Zion","drive":"No driving — mandatory park shuttle","wx":"Hot: ~39°C by 2pm","leaveBy":"5:40","leaveNote":"First Zion shuttles ~6am; by 9am the queue is an hour and the canyon is an oven.","costs":{"stay":280,"food":90,"extra":[["Narrows gear ×2",60]]},"desc":"First shuttles ~6am — be on one. Rent water shoes + pole in Springdale (~$30). Hiking in the river is how you beat the heat. Pool + ice cream after 1pm.","stops":[{"name":"Zion Visitor Center (park shuttle)","lat":37.2,"lng":-112.9869,"when":"first shuttle ~6am","note":"Park in Springdale, free town shuttle to the gate","guide":{"what":"Zion is a canyon you enter from the bottom, looking up — the inverse of the Grand Canyon — and in summer the scenic drive belongs to shuttles only. The Virgin River did all of this: a modest desert stream that drops so steeply it cuts like a bandsaw, 300+ m into Navajo sandstone.","see":["From the shuttle window (left side going in): the Court of the Patriarchs, Angels Landing's spine, the Great White Throne","Ride to the LAST stop (Temple of Sinawava) first thing and work backwards — everyone else does it forwards"],"tips":["Be in the shuttle line by 5:45 for the ~6am first bus; by 9am the wait can hit an hour","Park at the visitor center OR walk/town-shuttle from your Springdale hotel — hotel is usually easier","Zion is the one place this trip where crowds genuinely alter the experience — your dawn start is the whole strategy"],"fact":"Mormon settlers named it Zion — refuge. When Brigham Young visited and found tobacco and wine in use, he declared it 'not Zion,' and locals cheerfully called it Not Zion for years. The name without the Not stuck.","map":{"caption":"One road, one shuttle. Ride to the very end (stop 9) first — the canyon empties from the top down, and the Narrows are why you set the alarm.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><path d='M85,30 V208' stroke='#B01E24' stroke-width='4'/><path d='M85,208 V230' stroke='#B01E24' stroke-width='3' stroke-dasharray='4 4'/><text x='98' y='232' font-size='9.5' fill='#5A6068'>free town shuttle from Springdale<\/text><circle cx='85' cy='206' r='6' fill='#fff' stroke='#B01E24' stroke-width='2.5'/><text x='100' y='202' font-size='10.5' fill='#22262A' font-weight='700'>1 · Visitor Center — board 5:45am<\/text><circle cx='85' cy='170' r='5' fill='#fff' stroke='#B01E24' stroke-width='2'/><text x='100' y='174' font-size='10' fill='#22262A'>4 · Court of the Patriarchs<\/text><circle cx='85' cy='140' r='5' fill='#fff' stroke='#B01E24' stroke-width='2'/><text x='100' y='144' font-size='10' fill='#22262A'>5 · Zion Lodge (snacks, restrooms)<\/text><circle cx='85' cy='110' r='5' fill='#fff' stroke='#B01E24' stroke-width='2'/><text x='100' y='114' font-size='10' fill='#22262A'>6 · The Grotto — Angels Landing TH<\/text><text x='100' y='126' font-size='8.5' fill='#B01E24'>(permit lottery only)<\/text><circle cx='85' cy='78' r='5' fill='#fff' stroke='#B01E24' stroke-width='2'/><text x='100' y='82' font-size='10' fill='#22262A'>8 · Big Bend — spot climbers<\/text><circle cx='85' cy='40' r='7' fill='#F5C518' stroke='#8A6D00' stroke-width='2.5'/><text x='100' y='38' font-size='10.5' fill='#22262A' font-weight='700'>9 · Temple of Sinawava<\/text><text x='100' y='51' font-size='9.5' fill='#8A6D00' font-weight='700'>⭐ Narrows start — GO HERE FIRST<\/text><text x='20' y='120' font-size='10' fill='#00693C' font-weight='700' transform='rotate(-90 26 120)'>ride straight to the top ▸<\/text><\/svg>"}}},{"name":"Temple of Sinawava — Riverside Walk","lat":37.2852,"lng":-112.9477,"dur":"4–5 h in the river","note":"Then wade upstream into the Narrows","guide":{"what":"The Narrows is the canyon at its narrowest — walls 300 m tall, river 6 m wide — and the trail IS the river: you wade upstream in the Virgin, sometimes shin-deep, sometimes to your thighs, in the most famous slot canyon walk on Earth. July water is ~15–18°C: shocking for one minute, perfect after ten.","see":["Riverside Walk (1.7 km paved) delivers you to the river entrance","Mystery Falls (30 min in) — a ribbon waterfall down the wall","Wall Street begins ~1.5 h upstream: the walls close to a hallway and the sky becomes a crack — THE Narrows photo; go at least this far if legs allow","Big Springs (~4 h round trip point) is the legal turnaround without a permit"],"tips":["The rented boots + staff are not optional-feeling once you're in: the riverbed is greased bowling balls","Phone in the waterproof pouch, snacks in a dry bag; keep camera ready — light beams hit the water mid-morning","Any storm ANYWHERE upstream = flash flood risk; if rangers post a warning, believe them (the river can rise a metre in minutes)","Back by 1pm: pool, ice cream, and the A/C nap you'll have earned"],"fact":"Those walls are petrified sand dunes — 2,000 m of Jurassic desert stacked and cemented, then sliced by a stream you can step across. Given 10 million more years, the river intends to erase them entirely.","map":{"caption":"The trail is the river. Paved walk to the entry, then wade upstream — Wall Street's closing walls are the reward at ~1.5 h in. Turn around at Big Springs.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><text x='14' y='20' font-size='10' fill='#B01E24' font-weight='700'>⚠ any storm forecast = do not enter<\/text><path d='M126,232 C120,180 130,120 142,62 C146,46 150,36 154,26' fill='none' stroke='#B98A56' stroke-width='4'/><path d='M218,232 C224,180 212,120 196,62 C192,46 188,36 184,26' fill='none' stroke='#B98A56' stroke-width='4'/><path d='M172,232 C168,180 172,120 170,62 C169,46 169,36 169,26' fill='none' stroke='#8FB8D8' stroke-width='9' opacity='0.9'/><rect x='140' y='222' width='64' height='14' rx='2' fill='#fff' stroke='#23272B' stroke-width='1.5'/><text x='144' y='232' font-size='8.5' fill='#22262A'>SHUTTLE STOP 9<\/text><path d='M206,222 C212,204 214,192 212,178' fill='none' stroke='#697077' stroke-width='3'/><text x='222' y='200' font-size='9.5' fill='#5A6068'>Riverside Walk<\/text><text x='222' y='211' font-size='9.5' fill='#5A6068'>1.7 km paved<\/text><text x='214' y='166' font-size='10' fill='#00693C' font-weight='700'>▸ enter the river<\/text><text x='226' y='142' font-size='12'>⭐<\/text><text x='238' y='146' font-size='9.5' fill='#22262A'>Mystery Falls (30 min)<\/text><text x='108' y='120' font-size='10' fill='#8A6D00' transform='rotate(-84 112 120)'>wade upstream ~1.5 h<\/text><text x='206' y='66' font-size='13'>📷<\/text><text x='218' y='58' font-size='10.5' fill='#22262A' font-weight='700'>⭐ Wall Street —<\/text><text x='218' y='70' font-size='9.5' fill='#5A6068'>walls close to 6 m<\/text><text x='150' y='18' font-size='10' fill='#B01E24' font-weight='700'>Big Springs — turn around<\/text><\/svg>"}}}],"stay":{"place":"Springdale (2nd night)","cost":"~$280","lat":37.1889,"lng":-112.9988},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Springdale%2C+UT&destination=Zion+National+Park+Visitor+Center"},{"n":12,"date":"2026-07-16","title":"Zion → Las Vegas","tz":"America/Los_Angeles","mi":160,"mapLabel":"Vegas","drive":"~160 mi · 2.5 h","wx":"Vegas ~41°C — indoor evening","leaveBy":"10:00","leaveNote":"Short drive; Vegas is a night city — save your energy.","costs":{"stay":100,"food":110,"fuel":30},"desc":"Arrive early afternoon, nap in the A/C. Evening: the Strip as a free spectacle + one legendary buffet. Midweek rooms are a bargain.","stops":[{"name":"Bellagio Fountains","lat":36.1126,"lng":-115.1767,"when":"after dark","note":"Shows every 15–30 min","guide":{"what":"A 3.2-hectare artificial lake on the Strip where 1,214 fountains dance to music every half hour (every 15 min in the evening), throwing water 140 m with air-cannon 'shooters' you feel in your chest. Free, and unimprovably Vegas: the desert's scarcest resource, flung skyward for applause.","see":["At least two shows — the playlist rotates (opera to Elvis); the view from the center of the sidewalk rail is best","The Bellagio Conservatory inside (also free): a botanical set-piece rebuilt seasonally with hundreds of thousands of flowers","Look up behind you: the Eiffel Tower replica frames the fountains from Paris Las Vegas"],"tips":["Shows run to midnight; full darkness (after ~8:30pm in July) is when the lights matter","Street parking doesn't exist; Bellagio self-parking is free for the first hour-ish, or walk the Strip from your hotel","41°C outside — do the Strip after dinner, museum-hop casinos for the A/C between landmarks"],"fact":"The lake uses water from wells the resort owns — recycled and, per the engineers, less than the golf course that occupied this land before 1998."}},{"name":"The Sphere (exterior)","lat":36.1207,"lng":-115.162,"when":"night","guide":{"what":"The Sphere (2023): 111 m tall, wrapped in 54,000 m² of programmable LED — the largest screen on Earth. From outside it becomes an eyeball, a planet, a pumpkin, a fishbowl; the exterior art rotates all night and the whole thing cost more than most airports ($2.3 billion).","see":["The exosphere animations — best sightlines from the Venetian's pedestrian bridges or the top of the Palazzo garage (free, unofficial, popular)","The 'blink' — when the eyeball looks at you, the crowd audibly reacts"],"tips":["Exterior is free and visible from half the Strip; going inside (concerts/'Sphere Experience') is a separate wallet decision","It's a 15-min walk from the Strip proper — pair it with the Venetian's canals for A/C on the way"],"fact":"There are 1.2 million LED pucks out there, each with 48 diodes, spaced 20 cm apart — the resolution is calibrated for viewing from the freeway."}},{"name":"Fremont Street light canopy","lat":36.1699,"lng":-115.1443,"when":"late evening","guide":{"what":"Old Vegas: Fremont Street is where the town began in 1905 and where the neon went when the Strip got tasteful. The Viva Vision canopy — 420 m long, 12 m up — runs hourly light shows over five blocks of vintage casinos, street performers, and zero pretension.","see":["The canopy show on the hour after dark","Binion's and the Golden Nugget — 1950s Vegas still operating (the Nugget lobby displays a 27 kg gold nugget, real)","The restored neon: Vegas Vic the waving cowboy has been up since 1951","SlotZilla zipliners flying overhead the length of the street"],"tips":["20 min drive from the Strip; rideshare beats parking here","It's grittier and looser than the Strip — that's the appeal; keep wallets in front pockets","Cheap, huge, deep-fried everything if the buffet didn't finish you"],"fact":"Fremont was the first paved street in Las Vegas and its casinos ran the first licenses in Nevada — the Strip is technically not even in the City of Las Vegas; this is."}}],"stay":{"place":"Las Vegas Strip","cost":"~$100","lat":36.1147,"lng":-115.1728},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Springdale%2C+UT&destination=Las+Vegas%2C+NV"},{"n":13,"date":"2026-07-17","title":"Vegas → Los Angeles","tz":"America/Los_Angeles","mi":280,"drive":"~280 mi · 4.5 h — leave by 9am","leaveBy":"8:30","leaveNote":"Leave by 9 or sit in Friday I-15 traffic in 41°C.","costs":{"stay":200,"food":90,"fuel":53},"desc":"Beat the heat and the Friday traffic. Evening: Griffith Observatory at sunset — the whole LA basin in one view. First In-N-Out (order it “animal style”).","stops":[{"name":"Griffith Observatory","lat":34.1184,"lng":-118.3004,"when":"sunset (~8pm)","dur":"~2 h","note":"LA basin + Hollywood sign","guide":{"what":"A 1935 Art Deco temple to public science on the shoulder of Mount Hollywood — free since opening because Griffith J. Griffith's will demanded it. The terrace view at sunset is the definitive look at Los Angeles: 1,200 km² of city igniting light by light, the Hollywood Sign to your right, the Pacific burning behind Santa Monica.","see":["Sunset from the south terraces, then STAY 30 min — the city-lights phase beats the sunset itself","The Foucault pendulum knocking over pins as the Earth rotates under it, the Tesla coil, and the basement's scale-model solar system","Public telescopes on the lawn and roof after dark — volunteers aim them at whatever's up; free, queue moves fast","The Hollywood Sign (1923): erected as 'HOLLYWOODLAND,' an illuminated real-estate ad meant to last 18 months"],"tips":["Parking is the boss fight: the summit lot is paid and fills before sunset — arrive by 6:30pm, or park down Vermont Ave and walk up 15 min","Bring the fleece one more time: LA evenings run cool up here","The café is fine; better plan is In-N-Out after (10 min down the hill)"],"fact":"Griffith donated the land and observatory money after (and partly to atone for) shooting his wife — she survived, he did two years in San Quentin, and LA got its best public building out of the scandal. The city debated refusing the gift.","map":{"caption":"The summit lot fills before sunset — Plan B is parking low on Vermont and walking up 15 minutes. Terraces face the city; the lawn faces the Hollywood Sign.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><polyline points='16,52 30,38 44,50 58,36 72,48' fill='none' stroke='#B98A56' stroke-width='2.5'/><text x='16' y='28' font-size='9' fill='#5A6068' letter-spacing='2'>HOLLYWOOD<\/text><rect x='140' y='62' width='64' height='18' rx='2' fill='#fff' stroke='#23272B' stroke-width='1.5'/><circle cx='152' cy='60' r='6' fill='#fff' stroke='#23272B' stroke-width='1.5'/><circle cx='172' cy='56' r='7' fill='#fff' stroke='#23272B' stroke-width='1.5'/><circle cx='192' cy='60' r='6' fill='#fff' stroke='#23272B' stroke-width='1.5'/><text x='212' y='74' font-size='10' fill='#22262A' font-weight='700'>Observatory (free)<\/text><line x1='140' y1='88' x2='204' y2='88' stroke='#697077' stroke-width='3'/><text x='210' y='92' font-size='13'>📷<\/text><text x='224' y='94' font-size='10' fill='#22262A'>sunset terraces<\/text><ellipse cx='100' cy='102' rx='34' ry='14' fill='#B9CDB4' opacity='0.7'/><text x='72' y='106' font-size='9.5' fill='#22262A'>lawn<\/text><text x='42' y='126' font-size='9.5' fill='#5A6068'>◂ sign view from here<\/text><rect x='150' y='112' width='44' height='16' rx='3' fill='#EEF2F8' stroke='#10437C' stroke-width='1.5'/><text x='154' y='124' font-size='9.5' fill='#10437C' font-weight='700'>🅿 summit<\/text><text x='200' y='124' font-size='9' fill='#B01E24' font-weight='700'>full by ~6pm ⚠<\/text><path d='M172,130 C210,150 150,172 196,196 C216,208 200,222 190,228' fill='none' stroke='#697077' stroke-width='5'/><text x='226' y='214' font-size='9.5' fill='#5A6068'>W Observatory Rd<\/text><path d='M258,224 C240,194 224,164 208,138' fill='none' stroke='#D69500' stroke-width='2.5' stroke-dasharray='6 4'/><text x='252' y='240' font-size='9.5' fill='#8A6D00'>walk up from Vermont Ave lots · 15 min<\/text><\/svg>"}}},{"name":"In-N-Out Burbank","lat":34.177,"lng":-118.3282,"when":"dinner after","note":"Animal style","optional":true,"guide":{"what":"The original In-N-Out opened in Baldwin Park in 1948 — California's first drive-thru burger stand, still family-owned, menu unchanged and secret menu memorized by the entire state. This is the first-timer's rite of passage, conveniently 10 minutes from your hotel.","see":["Order: Double-Double Animal Style (mustard-grilled patties, extra spread, grilled onions), fries 'well-done,' a Neapolitan shake if you're showing off","The palm trees out front are planted in an X — founder Harry Snyder loved 'It's a Mad, Mad, Mad, Mad World,' where treasure is buried under a big W of palms"],"tips":["'Animal Style' isn't on the menu board; just say it, they'll nod","Drive-thru line looks apocalyptic but moves absurdly fast — that's the company's whole engineering obsession"],"fact":"Everything is made in view: no freezers, no microwaves, no heat lamps exist in any store — potatoes are cut in the shop and the beef never freezes. It's why there's no In-N-Out east of Texas: every store must sit within a day of a patty plant."}}],"stay":{"place":"Universal City / Burbank ×3 nights","cost":"~$200","lat":34.1381,"lng":-118.3534},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Las+Vegas%2C+NV&destination=Universal+City%2C+CA&waypoints=Griffith+Observatory"},{"n":14,"date":"2026-07-18","title":"Universal Studios Hollywood","tz":"America/Los_Angeles","mi":5,"mapLabel":"LA","drive":"Zero driving — park at the resort","leaveBy":"8:15","leaveNote":"Gates 9am, be there 8:45 — every early hour = one fewer 70-min queue.","costs":{"stay":200,"food":120,"extra":[["Universal tickets ×2",310]]},"desc":"Arrive at opening (9am). Priority order: Super Nintendo World & Mario Kart first, then the Lower Lot (Jurassic World, Transformers), Studio Tour midday, Hogwarts & Butterbeer in the afternoon.","stops":[{"name":"Universal Studios Hollywood","lat":34.1381,"lng":-118.3534,"when":"gates 9am — arrive 8:45","dur":"all day","note":"Nintendo World first, Studio Tour midday","guide":{"what":"A working film studio that happens to run a theme park on top — the Studio Tour has trundled past active soundstages since 1964, and the rides are the movies weaponized. With one day: ruthless priorities, mobile ordering, and shade strategy.","see":["Super Nintendo World FIRST at rope drop: Mario Kart: Bowser's Challenge (AR headset kart racing) before the wait hits 90 min; grab a virtual queue for the land itself in the app if required that day","Studio Tour (60 min, midday when it's hottest — you're seated and shaded): King Kong 360 3-D, the Fast & Furious finale, the Psycho house, Jaws, the real War of the Worlds plane-crash set","Lower Lot: Jurassic World (you WILL get wet — perfect at 2pm), Transformers, The Mummy (best pure coaster in the park)","Hogwarts in the afternoon: Forbidden Journey is the best dark ride ever built; frozen Butterbeer, non-negotiable","WaterWorld stunt show — the sleeper hit; sit in the splash zone or regret your dryness"],"tips":["Be at the gates 8:30–8:45 for a 9am open; the first two hours equal the next six","Single-rider lines cut waits by half or more on Mario Kart, Transformers, Mummy, Jurassic","Download the app now: live wait times + mobile food ordering; refillable Coke cup pays for itself by 1pm","The park is built on a hill in two tiers connected by the 'Starway' escalators — plan Lower Lot as ONE visit, not three"],"fact":"Nintendo of Japan supervised Super Nintendo World down to the timing of the coin-block 'ding' — the Power-Up Band mini-games hide a real boss fight (Bowser Jr.) that most visitors never find. Ask a team member in the land.","map":{"caption":"Two tiers connected by the Starway escalators. Numbers = your order. Nintendo before the crowd, Lower Lot while it's building, Studio Tour seated in the midday heat, Hogwarts after.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><rect x='28' y='30' width='284' height='112' rx='14' fill='#FAF0E4' stroke='#B98A56' stroke-width='2'/><text x='36' y='24' font-size='9.5' fill='#B98A56' letter-spacing='2'>UPPER LOT<\/text><text x='10' y='92' font-size='11' fill='#00693C' font-weight='700'>▸<\/text><text x='2' y='106' font-size='8.5' fill='#00693C'>gates<\/text><circle cx='72' cy='62' r='9' fill='#B01E24'/><text x='68' y='66' font-size='11' fill='#fff' font-weight='700'>1<\/text><text x='86' y='60' font-size='10.5' fill='#22262A' font-weight='700'>Super Nintendo World<\/text><text x='86' y='72' font-size='9' fill='#5A6068'>Mario Kart first, rope-drop run<\/text><circle cx='140' cy='104' r='9' fill='#B01E24'/><text x='136' y='108' font-size='11' fill='#fff' font-weight='700'>3<\/text><text x='154' y='102' font-size='10.5' fill='#22262A' font-weight='700'>Studio Tour<\/text><text x='154' y='114' font-size='9' fill='#5A6068'>midday — seated + shaded<\/text><circle cx='252' cy='62' r='9' fill='#B01E24'/><text x='248' y='66' font-size='11' fill='#fff' font-weight='700'>4<\/text><text x='266' y='60' font-size='10.5' fill='#22262A' font-weight='700'>Hogwarts<\/text><text x='250' y='74' font-size='9' fill='#5A6068'>+ Butterbeer<\/text><circle cx='292' cy='106' r='9' fill='#B01E24'/><text x='288' y='110' font-size='11' fill='#fff' font-weight='700'>5<\/text><text x='226' y='132' font-size='9.5' fill='#22262A'>WaterWorld — splash zone<\/text><path d='M170,142 L192,182' stroke='#697077' stroke-width='5'/><text x='198' y='168' font-size='9.5' fill='#5A6068'>Starway escalators<\/text><rect x='110' y='184' width='202' height='44' rx='12' fill='#EAF2F8' stroke='#10437C' stroke-width='2'/><text x='118' y='180' font-size='9.5' fill='#10437C' letter-spacing='2'>LOWER LOT<\/text><circle cx='140' cy='206' r='9' fill='#B01E24'/><text x='136' y='210' font-size='11' fill='#fff' font-weight='700'>2<\/text><text x='154' y='204' font-size='10.5' fill='#22262A' font-weight='700'>Jurassic · Transformers · Mummy<\/text><text x='154' y='217' font-size='9' fill='#5A6068'>one visit — use single-rider lines<\/text><\/svg>"}}}],"stay":{"place":"Universal City / Burbank","cost":"~$200","lat":34.1381,"lng":-118.3534},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Burbank%2C+CA&destination=Universal+Studios+Hollywood"},{"n":15,"date":"2026-07-19","title":"LA Beach Day — the Pacific","tz":"America/Los_Angeles","mi":40,"drive":"City driving only · ~40 mi","wx":"Perfect: ~26°C at the coast","leaveBy":"9:30","leaveNote":"Beach day — the pier is better after 10am anyway.","costs":{"stay":200,"food":85,"fuel":8,"extra":[["Ferris wheel + parking",35]]},"desc":"Santa Monica Pier — the official western end of Route 66 (you'll drive the eastern stretches home). Dip in the Pacific, tacos, sunset from the Ferris wheel ($10).","stops":[{"name":"Santa Monica Pier — Route 66 end","lat":34.0084,"lng":-118.4987,"when":"from ~10am","note":"“End of the Trail” sign photo","guide":{"what":"The 1909 Santa Monica Pier is the oldest pleasure pier on the West Coast and the ceremonial end of Route 66 — 'End of the Trail,' says the sign, 3,940 km from Grant Park in Chicago, where you started driving 15 days ago. You'll drive the mother road's surviving stretches home; today you touch the terminus.","see":["The Route 66 'End of the Trail' sign (mid-pier) — the photo that bookends your trip","The 1922 Looff Hippodrome carousel building (National Historic Landmark) and its hand-carved horses","Pacific Park's Ferris wheel — the world's only solar-powered one; $10-ish and worth it at sunset","Fishermen on the far end pulling up mackerel while pelicans supervise"],"tips":["Beach parking lots south of the pier are easiest (~$15); arrive from 10am, swim mid-day, pier at sunset","The Pacific in July is ~19°C — brisk for 90 seconds, then glorious","Tacos: the stands on the boardwalk toward Venice beat the pier restaurants"],"fact":"Route 66 never officially ended here — the real terminus was an intersection downtown — but a 2009 ceremony moved the symbolic sign to the sea because everyone agreed a road called 'America's Main Street' should end at the ocean.","map":{"caption":"Everything worth seeing is strung along the boardwalk: arch photo at the entrance, the Route 66 sign mid-pier, wheel at the end. Venice is a 30-minute walk south on the sand.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><path d='M10,96 L330,72 L330,10 L10,10 Z' fill='#F3E4CE'/><path d='M10,96 L330,72 L330,235 L10,235 Z' fill='#CFE3F2'/><text x='40' y='210' font-size='10' fill='#5A6068'>Pacific — 19°C, be brave<\/text><path d='M296,76 L70,168' stroke='#C9A227' stroke-width='12' stroke-linecap='round'/><text x='284' y='58' font-size='13'>📷<\/text><text x='232' y='50' font-size='10' fill='#22262A' font-weight='700'>neon arch entrance<\/text><rect x='222' y='96' width='20' height='14' fill='#fff' stroke='#23272B' stroke-width='1.5' transform='rotate(-21 232 103)'/><text x='250' y='106' font-size='9.5' fill='#5A6068'>1922 carousel<\/text><text x='168' y='120' font-size='12'>⭐<\/text><text x='150' y='108' font-size='10.5' fill='#22262A' font-weight='700'>ROUTE 66 — END sign 📷<\/text><circle cx='118' cy='148' r='13' fill='none' stroke='#B01E24' stroke-width='2.5'/><line x1='118' y1='135' x2='118' y2='161' stroke='#B01E24' stroke-width='1.5'/><line x1='105' y1='148' x2='131' y2='148' stroke='#B01E24' stroke-width='1.5'/><text x='84' y='176' font-size='9.5' fill='#22262A'>solar Ferris wheel — sunset ride<\/text><text x='58' y='158' font-size='9.5' fill='#5A6068'>fishermen + pelicans at the tip<\/text><rect x='296' y='96' width='34' height='16' rx='3' fill='#EEF2F8' stroke='#10437C' stroke-width='1.5'/><text x='300' y='108' font-size='9.5' fill='#10437C' font-weight='700'>🅿 ~$15<\/text><text x='216' y='226' font-size='10' fill='#8A6D00'>▾ Venice: 30 min walk south on the sand<\/text><\/svg>"}}},{"name":"Venice Beach Boardwalk","lat":33.985,"lng":-118.4695,"dur":"~2 h","guide":{"what":"Abbot Kinney built actual canals here in 1905 to conjure 'Venice of America,' complete with gondoliers. Most were paved for cars, but the surviving six blocks are LA's secret garden — and the boardwalk out front is the city's id: bodybuilders, buskers, chainsaw jugglers, and the skatepark where modern skateboarding was invented.","see":["Venice Skatepark — sunken concrete bowls on the sand; the locals flying out of them are ex-pros and future ones","Muscle Beach outdoor gym (Arnold's alma mater)","The canals: walk 3 blocks inland at 25th/Dell Ave — ducks, footbridges, absurd real estate, total silence","Boardwalk murals, including the Jim Morrison one (The Doors formed here)"],"tips":["Walk or beach-path bike from Santa Monica (30 min on foot along the sand) rather than re-parking","The boardwalk is theatre — enjoy performers, tip if you photograph them, keep phones zipped","Sunset drink pick: rooftop at Hotel Erwin overlooks the whole circus"],"fact":"Kinney's Venice had gondoliers imported from Italy and a miniature railroad; when oil was struck in 1929, derricks stood between the canals for decades. LA has been at least four different cities on this exact sand."}}],"stay":{"place":"Universal City / Burbank (3rd night)","cost":"~$200","lat":34.1381,"lng":-118.3534},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Universal+City%2C+CA&destination=Santa+Monica+Pier&waypoints=Venice+Beach+Boardwalk"}]},{"name":"Leg 4 · Grand Canyon & Route 66 Home","dates":"Jul 20 – 29","days":[{"n":16,"date":"2026-07-20","title":"LA → Route 66 → Williams, AZ","tz":"America/Phoenix","mi":440,"drive":"~440 mi · 6.5–7 h — 2nd longest day","leaveBy":"7:30","leaveNote":"Second-longest day (440 mi) + Route 66 stops. Leave LA before traffic.","costs":{"stay":200,"food":75,"fuel":84},"desc":"Leave by 8am. Detour onto historic Route 66 at Kingman → Seligman, the town that inspired Cars. Williams is the last Route 66 town bypassed by the interstate — neon signs, diners.","stops":[{"name":"Kingman — Route 66 Museum","lat":35.1894,"lng":-114.053,"dur":"30 min","note":"Join historic 66 here","optional":true,"guide":{"what":"Kingman is where you leave the interstate for the longest surviving uninterrupted stretch of Route 66 — 255 km of the original road to Seligman that I-40 never swallowed. The museum in the 1907 powerhouse tells the road's whole arc: Dust Bowl exodus, neon boom, bypass and rebirth.","see":["The Route 66 Museum's Dust Bowl room — Okie jalopies packed like Grapes of Wrath, because this literally was that road","The electric-vehicle museum in the same building, weirdly delightful"],"tips":["30 min max — the road ahead is the real exhibit","Top up gas here; the historic stretch is beautiful and empty","The climb east crosses Sitgreaves Pass alternative? No — you're on the flat eastern stretch; enjoy 100 km of open two-lane with Burma-Shave signs"],"fact":"Route 66 (1926–1985) was decommissioned entirely — it doesn't officially exist. Arizona's stretch survived because Seligman's town barber refused to let it die (you're about to meet his shop)."}},{"name":"Delgadillo's Snow Cap, Seligman","lat":35.3258,"lng":-112.8746,"when":"lunch","dur":"45 min","note":"Milkshake in the town that inspired Cars","guide":{"what":"Juan Delgadillo built the Snow Cap in 1953 from scrap lumber off the Santa Fe railroad and spent 50 years serving 'cheeseburgers with cheese' and squirting customers with a trick mustard bottle (it's string). His brother Angel — the town barber — founded the association that got Route 66 its 'Historic' designation in 1987 and saved every town on this road.","see":["The menu gags, the door handle that isn't, the mustard trick — order a milkshake and a 'dead chicken' and play along","The backyard of vintage cars and 70 years of accumulated Americana","Angel's barbershop/visitor center two doors down — his family still runs it; the guestbook has signatures from every country on Earth"],"tips":["Cash-friendly, line moves fast, eat at the picnic tables","Seligman was Pixar's model for Radiator Springs — John Lasseter interviewed Angel here; the whole town leans into it and has earned the right"],"fact":"When I-40 bypassed Seligman in 1978, businesses died in a single day. Angel Delgadillo's response — 'they took our road, we'll take it back' — is why 'Historic Route 66' signs exist anywhere in America."}},{"name":"Williams, AZ","lat":35.2494,"lng":-112.191,"when":"evening neon","note":"Neon signs & diners","guide":{"what":"Williams was the LAST town on all 3,940 km of Route 66 to be bypassed — it held out until October 13, 1984, with lawyers, and only surrendered when the state promised three exits. Tonight it's the best-preserved slice of the neon road anywhere: two one-way streets of diners, saloons and motel signs buzzing pink against the pines.","see":["The neon loop after dark: walk both one-way streets (Route 66 eastbound, Railroad Ave westbound) — 15 unhurried minutes","The Grand Canyon Railway depot (1908) — the vintage train still departs for the rim every morning with staged train robberies on the way back","Pete's Route 66 Gas Station Museum if it's open — one man's perfect little collection"],"tips":["Dinner: Station 66 (pizza in the old gas station, patio) or Goldies Route 66 Diner for the full chrome-and-vinyl experience","Fill the tank tonight — tomorrow is all park roads","Elk wander into town at dusk; that's normal here"],"fact":"On bypass day in 1984, Bobby Troup — who wrote '(Get Your Kicks on) Route 66' — came and sang it on a flatbed truck as the last stoplight on the mother road went dark."}}],"stay":{"place":"Williams or Tusayan ×2 nights","cost":"~$200","lat":35.2494,"lng":-112.191},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Universal+City%2C+CA&destination=Williams%2C+AZ&waypoints=Seligman%2C+AZ"},{"n":17,"date":"2026-07-21","title":"Grand Canyon South Rim","tz":"America/Phoenix","mi":60,"mapLabel":"Grand Canyon","drive":"~60 mi to the rim","wx":"Rim ~29°C (2,100 m) — do NOT hike deep","leaveBy":"6:30","leaveNote":"Rim parking fills by ~9am. Hardcore option: leave 4:45 for the 5:20 sunrise at Mather.","costs":{"stay":200,"food":75,"fuel":11},"desc":"Sunrise at Mather Point, walk the flat Rim Trail, free shuttle to the Hermit's Rest viewpoints. If you must descend: Bright Angel to the 1.5-mile resthouse, before 8am only. Sunset at Hopi Point is the grand finale.","stops":[{"name":"Mather Point","lat":36.0617,"lng":-112.1075,"when":"sunrise 5:20 — or by 9am","note":"Village parking fills by ~9am","guide":{"what":"The Grand Canyon does not photograph, describe, or prepare-for: 446 km long, up to 29 km wide, 1.8 km deep, and your first look at it from Mather Point is a genuine neurological event. The rocks at the river are 1.8 BILLION years old — the canyon exposes 40% of Earth's history in one wall.","see":["The first 10 seconds — put the phone down for them, then take the photos","Read the wall like a book: the top layer (Kaibab limestone, 270 M yrs) was a sea floor; the great red cliffs (Redwall, 340 M) another sea; the dark basement rock (Vishnu schist) is older than complex life","California condors — 3-metre wingspan, numbered wing tags, one of the rarest birds on Earth; they patrol the rim thermals most mornings"],"tips":["Sunrise (~5:20am, no DST here) is the hardcore option and worth it once in a life; otherwise be parked in the Village by 8:30am before lots fill","Walk west on the flat, paved Rim Trail from Mather toward Yavapai Point (30 min) — the crowds evaporate 400 m from any parking lot","Yavapai Geology Museum (free, on your walk) has the canyon's best explainer and a huge window — 20 min well spent","The rim is at 2,100 m: sunscreen works overtime and beer works double, plan accordingly"],"fact":"The Colorado River did all of this in about 5–6 million years — a geologic instant. The canyon deepens the thickness of a sheet of paper each year, and the river you'll glimpse is 1.6 km down yet you'll hear it in the quiet spots.","map":{"caption":"First look at Mather, then drift west along the flat Rim Trail — the crowd is gone within 400 m and the Yavapai geology window explains everything you're seeing.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><polyline points='10,96 50,86 90,100 130,88 180,98 230,86 280,96 330,90' fill='none' stroke='#B98A56' stroke-width='3'/><text x='92' y='44' font-size='11' fill='#B98A56' font-weight='700' letter-spacing='2'>GRAND CANYON — 1.8 KM DEEP<\/text><path d='M116,66 L128,54 L140,66 Z' fill='#E8D5BB' stroke='#B98A56' stroke-width='1.5'/><path d='M216,62 L228,50 L240,62 Z' fill='#E8D5BB' stroke='#B98A56' stroke-width='1.5'/><circle cx='282' cy='96' r='5' fill='#B01E24'/><text x='250' y='116' font-size='13'>📷<\/text><text x='264' y='118' font-size='10.5' fill='#22262A' font-weight='700'>Mather Pt<\/text><rect x='276' y='130' width='52' height='24' rx='3' fill='#EEF2F8' stroke='#10437C' stroke-width='1.5'/><text x='282' y='141' font-size='9.5' fill='#10437C' font-weight='700'>🅿 + VC<\/text><text x='282' y='151' font-size='8' fill='#B01E24'>full by 9am ⚠<\/text><path d='M274,104 C220,116 160,114 70,112' fill='none' stroke='#D69500' stroke-width='3' stroke-dasharray='7 5'/><text x='150' y='132' font-size='9.5' fill='#8A6D00'>Rim Trail — flat, paved, ◂ west<\/text><text x='142' y='102' font-size='12'>⭐<\/text><text x='96' y='150' font-size='10' fill='#22262A' font-weight='700'>Yavapai Geology Museum<\/text><text x='96' y='162' font-size='9' fill='#5A6068'>best explainer + A/C + the window<\/text><text x='16' y='134' font-size='10' fill='#5A6068'>▸ Village, lodges,<\/text><text x='16' y='146' font-size='10' fill='#5A6068'>shuttle hub<\/text><text x='80' y='200' font-size='10' fill='#00693C' font-weight='700'>crowds evaporate 400 m from any parking lot<\/text><\/svg>"}}},{"name":"Bright Angel Trailhead","lat":36.0577,"lng":-112.1445,"when":"before 8am only","note":"1.5-mile resthouse max","optional":true,"guide":{"what":"Bright Angel is THE trail — the mule route, the fault-line path Havasupai people used for centuries — and in July it's also where most rescues happen. The iron rule: going down is optional, coming up is mandatory, and July heat rises 5–8°C for every 300 m you descend.","see":["The tunnel through the rock 200 m down, and the switchbacks stacked below like ribbon","Mule trains (they have right of way — stand quietly on the inside of the trail)","1.5-Mile Resthouse: your absolute turnaround — shade, water (usually), and a very different canyon than the rim showed you"],"tips":["Start before 8am or don't start; be climbing out before the heat, not in it","2× the water you think, salty snacks, hat; the climb out takes twice the descent time","Even 20 minutes down changes the canyon from a picture into a place — do that much at minimum","NEVER attempt rim-to-river-and-back in a day; the warning signs quote the marathon runner who died trying"],"fact":"The resthouses were built in the 1930s by the CCC; the trail's water pipeline is so old and burst-prone the park is replacing it — check the tap status board at the trailhead like everyone else.","map":{"caption":"Side view, not a map: every step down is a hotter step you owe back. The 1.5-Mile Resthouse is the line — below it, July does the deciding, not you.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><text x='96' y='24' font-size='10.5' fill='#22262A' font-weight='700'>down = optional · up = mandatory<\/text><path d='M20,56 L92,56 L112,84 L152,98 L184,132 L218,152 L252,188 L330,202 L330,235 L20,235 Z' fill='#F3E4CE'/><path d='M20,56 L92,56 L112,84 L152,98 L184,132 L218,152' fill='none' stroke='#B98A56' stroke-width='3.5'/><path d='M218,152 L252,188 L330,202' fill='none' stroke='#9AA1A8' stroke-width='2.5' stroke-dasharray='6 5'/><text x='24' y='46' font-size='10' fill='#22262A' font-weight='700'>RIM 2,100 m · ~29°C<\/text><circle cx='88' cy='54' r='4' fill='#00693C'/><text x='60' y='72' font-size='9.5' fill='#00693C' font-weight='700'>trailhead<\/text><circle cx='114' cy='84' r='4' fill='#5A6068'/><text x='120' y='78' font-size='9.5' fill='#5A6068'>tunnel 📷<\/text><rect x='210' y='138' width='14' height='10' fill='#fff' stroke='#B01E24' stroke-width='2'/><text x='150' y='172' font-size='11' fill='#B01E24' font-weight='700'>⭐ 1.5-Mile Resthouse<\/text><text x='150' y='185' font-size='10.5' fill='#B01E24' font-weight='700'>TURN AROUND HERE<\/text><text x='240' y='222' font-size='9.5' fill='#9AA1A8'>Havasupai Gardens · river — NOT in July<\/text><text x='240' y='96' font-size='10' fill='#B01E24'>+5–8°C every<\/text><text x='240' y='108' font-size='10' fill='#B01E24'>300 m down<\/text><text x='24' y='222' font-size='9.5' fill='#5A6068'>2× water · salty snacks · climbing out takes 2× as long<\/text><\/svg>"}}},{"name":"Hopi Point","lat":36.0745,"lng":-112.1547,"when":"sunset ~7:45pm","note":"Free Hermit Road shuttle — ride back after dark","guide":{"what":"Hopi Point juts further into the canyon than anywhere else on Hermit Road — sunset from here paints 150 km of buttes in sequence as the shadow line sweeps east, and the river shows itself in two silver bends. This is the grand finale of the western half of your trip; treat it ceremonially.","see":["The named 'temples' igniting one by one: Isis, Osiris, Shiva — 1880s geologist Clarence Dutton named them for gods because ordinary words had already failed","Two Colorado River reaches visible below (rare on the South Rim)","The AFTER-show: 15–20 min past sunset the sky goes violet and the canyon exhales; most people leave exactly too early"],"tips":["Hermit Road is shuttle-only: red line from the Village, every 10–15 min; board 60–75 min before sunset to get position","The point is popular — walk 100 m along the rim trail either side for elbow room","Headlamp/phone light for the shuttle stop afterwards, and the fleece: rim temperature drops fast at 2,100 m"],"fact":"Dutton's 1882 survey report on this canyon is considered literature — he invented a whole descriptive vocabulary ('an innovation in nature') because European landscape language simply had no words for what you're looking at.","map":{"caption":"The red-line shuttle is the only way onto Hermit Road. Hopi is the sunset classic; if it's mobbed, Mohave one stop on is nearly as good and half as crowded.","svg":"<svg viewBox='0 0 340 170' xmlns='http://www.w3.org/2000/svg'><path d='M30,85 H310' stroke='#B01E24' stroke-width='4'/><circle cx='310' cy='85' r='7' fill='#fff' stroke='#B01E24' stroke-width='2.5'/><text x='252' y='64' font-size='10.5' fill='#22262A' font-weight='700'>Village — board here ▸<\/text><circle cx='262' cy='85' r='4' fill='#fff' stroke='#B01E24' stroke-width='2'/><text x='240' y='108' font-size='9' fill='#5A6068'>Trailview<\/text><circle cx='216' cy='85' r='4' fill='#fff' stroke='#B01E24' stroke-width='2'/><text x='196' y='64' font-size='9' fill='#5A6068'>Powell Pt<\/text><circle cx='160' cy='85' r='8' fill='#F5C518' stroke='#8A6D00' stroke-width='2.5'/><text x='128' y='114' font-size='11' fill='#22262A' font-weight='700'>⭐ HOPI PT 📷<\/text><text x='134' y='127' font-size='9' fill='#8A6D00'>sunset — walk 100 m for elbow room<\/text><circle cx='110' cy='85' r='4' fill='#fff' stroke='#B01E24' stroke-width='2'/><text x='88' y='64' font-size='9' fill='#5A6068'>Mohave — plan B<\/text><circle cx='30' cy='85' r='6' fill='#fff' stroke='#B01E24' stroke-width='2.5'/><text x='14' y='108' font-size='9' fill='#5A6068'>Hermits Rest<\/text><text x='40' y='152' font-size='9.5' fill='#5A6068'>every 10–15 min · board 60–75 min pre-sunset · light for the ride back<\/text><\/svg>"}}}],"stay":{"place":"Williams/Tusayan (2nd night)","cost":"~$200","lat":35.2494,"lng":-112.191},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Williams%2C+AZ&destination=Grand+Canyon+Village%2C+AZ"},{"n":18,"date":"2026-07-22","title":"Desert View → Petrified Forest → Santa Fe","tz":"America/Denver","mi":420,"mapLabel":"Santa Fe","drive":"~420 mi · ~6 h with stops","leaveBy":"8:00","leaveNote":"420 mi with three stops — Santa Fe by dinner needs discipline.","costs":{"stay":200,"food":80,"fuel":80},"desc":"Exit the canyon east past the Desert View Watchtower. Adobe evening in Santa Fe — the oldest capital in the US.","stops":[{"name":"Desert View Watchtower","lat":36.0402,"lng":-111.8262,"when":"~9am","dur":"45 min","note":"Last canyon view, exit east","guide":{"what":"Mary Colter's 1932 Desert View Watchtower is a 21-metre 'ruin' that never was — she studied ancestral Puebloan towers for months, then built a steel-framed homage so convincing people assume it's ancient. It's the canyon's easternmost overlook and your literal parting view.","see":["Inside: Hopi artist Fred Kabotie's murals spiral up the stairwell — the Snake Legend room is the masterpiece; climb to the top gallery windows","The river's big bend below — the canyon opens here and you can finally see the Colorado properly, green and working","The Painted Desert beginning to smear pink across the eastern horizon — that's where you're headed"],"tips":["45 min including the tower climb; restrooms + trading post here","This exit (east, Hwy 64 to Cameron) is slower but immeasurably better than backtracking — the Little Colorado gorge overlooks en route are free and startling","Navajo vendors at Cameron and the gorge overlooks sell real jewelry at fair prices if you want the trip's souvenir"],"fact":"Colter, one of very few female architects of her era, designed most of the canyon's great buildings. For the tower she had workers study each stone; she once made them tear down a wall because the 'ruin' looked too neat."}},{"name":"Meteor Crater","lat":35.0278,"lng":-111.0225,"dur":"~1 h","note":"$29 — optional; I-40 exit 233, before Winslow","optional":true,"guide":{"what":"Fifty thousand years ago an iron-nickel asteroid the size of a house hit Arizona at ~45,000 km/h and vaporized, leaving a bowl 1.2 km wide and 170 m deep that looks like it happened last Tuesday — the driest air on the continent preserved Earth's best impact crater almost perfectly.","see":["The rim view (you cannot see the crater until the last 10 steps — the reveal is theatrical)","The 300 kg Holsinger fragment in the museum — the largest surviving piece; you can touch 4.5-billion-year-old space metal","Apollo astronaut training photos: NASA sent every moonwalker here to learn crater geology"],"tips":["~$29/person, privately owned (the Barringer family has held it since 1903), 60–75 min with the rim tour","It is ferociously windy on the rim — hats become kites","Skip-decision guide: if you've never seen an impact crater, go; if budget/time is tight, the canyon this morning outranks it"],"fact":"Daniel Barringer spent 26 years and his fortune drilling for the iron mass — which had vaporized on impact. His bankruptcy proved the impact theory that made the site famous: the meteor's absence is the evidence."}},{"name":"Standin' on the Corner, Winslow AZ","lat":35.0242,"lng":-110.6974,"dur":"20 min","note":"Eagles photo op — I-40 exit 252","guide":{"what":"'Well, I'm a-standin' on a corner in Winslow, Arizona…' — one line in the Eagles' first single (1972, written by Jackson Browne with Glenn Frey) has kept this bypassed railroad town alive for 50 years. The town built the corner to match the song: flatbed Ford, girl reflection and all.","see":["The bronze troubadour statue (it's Browne-ish; a Frey statue joined it in 2016), the painted flatbed Ford, the trompe-l'oeil mural","La Posada, two blocks away: Mary Colter's 1930 masterpiece hotel, rescued from demolition — walk the gardens and lobby free; the Turquoise Room does a genuinely great lunch if you're ahead of schedule"],"tips":["20 minutes, free, ineluctably cheerful — someone will offer to take your photo; accept","The gift shop plays the song on loop; the staff have heard it ~40,000 times and are still nice"],"fact":"Browne wrote the verse stranded here after his car broke down — the 'girl in a flatbed Ford' was real, slowing down to look at his friend. The town's economy now measurably runs on those 17 words."}},{"name":"Petrified Forest NP","lat":35.0657,"lng":-109.7817,"dur":"~1.5 h drive-through","note":"Covered by your pass","guide":{"what":"A forest that became gemstone: 225 million years ago this was a Triassic river delta of 60-m conifers; buried in volcanic ash, their wood was replaced cell-by-cell with quartz — logs of solid agate and amethyst now weathering out of pastel hills. It's also the only national park containing a stretch of Route 66.","see":["Crystal Forest (the essential 20-min loop): logs shattered into cordwood rounds of red, purple and gold crystal — they broke like glass when the ground eroded from under them","The 1932 Studebaker at the Route 66 pullout — rusted where the mother road crossed the park","Painted Desert overlooks at the north end as you exit toward I-40 — the badlands go full watercolor near sunset","Newspaper Rock: 650+ petroglyphs viewable by spotting scope"],"tips":["The park road is a 45-km drive-through connecting I-40 to US-180 — enter south (Rainbow Forest) or north; with your route, north entrance in/out or the full transit both work; budget ~1.5 h","Taking even a pebble of petrified wood is a federal offense — buy legal pieces (collected off-park) at the shops outside for a few dollars","Gates close in the evening (~7-8pm summer) — this is why today's leave-by matters"],"fact":"The visitor center displays 'conscience letters' — decades of returned stolen wood fragments mailed back with apologies describing ruined marriages, lost jobs and general misfortune attributed to the 'curse.' The park neither confirms nor denies.","map":{"caption":"It's a drive-through park: one road, north to south. If you only stop twice, make it the Route 66 Studebaker and Crystal Forest.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><ellipse cx='60' cy='42' rx='30' ry='10' fill='#E8B4B8' opacity='0.7'/><ellipse cx='90' cy='56' rx='26' ry='8' fill='#C9A9D9' opacity='0.6'/><text x='36' y='76' font-size='9' fill='#5A6068'>Painted Desert<\/text><path d='M170,22 V226' stroke='#697077' stroke-width='6'/><text x='182' y='20' font-size='10' fill='#00693C' font-weight='700'>▾ enter from I-40 (north)<\/text><circle cx='170' cy='44' r='5' fill='#fff' stroke='#23272B' stroke-width='2'/><text x='184' y='48' font-size='10' fill='#22262A'>Painted Desert overlooks 📷<\/text><circle cx='170' cy='80' r='5' fill='#fff' stroke='#23272B' stroke-width='2'/><text x='42' y='84' font-size='10' fill='#22262A' font-weight='700'>⭐ Route 66 Studebaker<\/text><circle cx='170' cy='116' r='5' fill='#fff' stroke='#23272B' stroke-width='2'/><text x='184' y='120' font-size='10' fill='#22262A'>Newspaper Rock petroglyphs<\/text><circle cx='170' cy='152' r='5' fill='#fff' stroke='#23272B' stroke-width='2'/><text x='72' y='156' font-size='10' fill='#5A6068'>Blue Mesa (if time)<\/text><circle cx='170' cy='188' r='7' fill='#F5C518' stroke='#8A6D00' stroke-width='2.5'/><text x='184' y='186' font-size='10.5' fill='#22262A' font-weight='700'>⭐ Crystal Forest<\/text><text x='184' y='198' font-size='9' fill='#8A6D00'>THE 20-min log walk<\/text><circle cx='170' cy='218' r='5' fill='#fff' stroke='#23272B' stroke-width='2'/><text x='52' y='222' font-size='10' fill='#5A6068'>Rainbow Forest Museum<\/text><text x='182' y='238' font-size='9.5' fill='#5A6068'>▾ exit south → US-180 → I-40 E<\/text><text x='236' y='226' font-size='9.5' fill='#B01E24' font-weight='700'>gates close ~7pm ⚠<\/text><\/svg>"}}},{"name":"Santa Fe","lat":35.687,"lng":-105.9378,"guide":{"what":"You arrive tonight in the oldest capital city in the United States — founded 1610, a decade before the Mayflower — 2,100 m up at the foot of the Sangre de Cristo mountains, where every building by law wears adobe brown and the food has been fusion for 400 years.","see":["Tonight: just dinner and the walk to the Plaza if energy allows — it glows under the portal lamps","Full exploration is tomorrow morning (it's on the itinerary)"],"tips":["Dinner: Tomasita's (locals' red chile, by the railyard) or The Shed (half a block off the Plaza, book or queue) — when asked 'red or green?' the correct answer is 'Christmas' (both)","You gained an hour crossing into Mountain time — spend it on dinner","2,100 m again: hydrate, the margaritas here are famously load-bearing"],"fact":"Santa Fe's full name is La Villa Real de la Santa Fe de San Francisco de Asís — the Royal Town of the Holy Faith of St. Francis of Assisi. Locals have sensibly shortened it for 400 years."}}],"stay":{"place":"Santa Fe — oldest capital in the US","cost":"~$200","lat":35.687,"lng":-105.9378},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Grand+Canyon+Village%2C+AZ&destination=Santa+Fe%2C+NM&waypoints=Winslow%2C+AZ%7CPetrified+Forest+National+Park"},{"n":19,"date":"2026-07-23","title":"Santa Fe → Amarillo, TX","tz":"America/Chicago","mi":280,"mapLabel":"Amarillo","drive":"~280 mi · 4.5 h (afternoon)","leaveBy":"9:30","leaveNote":"Morning is for the Plaza; Cadillac Ranch wants sunset light anyway.","costs":{"stay":100,"food":75,"fuel":53,"extra":[["Spray paint",10]]},"desc":"Morning on Santa Fe Plaza: 400-year-old adobe old town and green-chile everything for lunch. Sunset: spray-paint a Cadillac at Cadillac Ranch (grab cans at a hardware store). Dinner at the Big Texan — watch someone attempt the 72oz steak challenge.","stops":[{"name":"Santa Fe Plaza","lat":35.6871,"lng":-105.9381,"when":"morning","dur":"~3 h","note":"Palace of the Governors, green-chile lunch","guide":{"what":"The Plaza has been Santa Fe's living room since 1610: the Palace of the Governors along its north side is the oldest continuously occupied public building in the US — Spanish, Mexican, Confederate (for two weeks) and American flags have all flown over it. Under its portal, Native artisans have sold jewelry by permit since the 1930s.","see":["The Palace portal market: buy directly from the artist — every piece is juried authentic (turquoise + silver here is the real thing, unlike much of Route 66)","San Miguel Chapel (5 min south): oldest church structure in the US, adobe from ~1610","Loretto Chapel's 'miraculous' helix staircase — two full 360° turns, no central support, built 1878 by a mysterious carpenter who vanished unpaid","Cathedral Basilica of St. Francis — the French Romanesque surprise Bishop Lamy built (of Willa Cather's 'Death Comes for the Archbishop')"],"tips":["Morning is coffee + strolling pace: 2–3 hours does the Plaza core","Green-chile breakfast burrito at Tia Sophia's (they claim to have invented it) two blocks west","Parking garages on Water St and San Francisco St beat circling the Plaza"],"fact":"The Santa Fe Trail from Missouri ended literally at this square — wagon ruts are still visible east of town. You'll be driving its replacement (I-25/US-285 corridor) out this afternoon, in reverse, like every trader since 1821."}},{"name":"Cadillac Ranch","lat":35.1872,"lng":-101.987,"when":"sunset ~8:45pm","dur":"45 min","note":"Bring spray cans","guide":{"what":"Ten Cadillacs (1949–1963, tracing the rise and fall of the tailfin) buried nose-down in a Texas wheat field at the same angle as the Great Pyramid's sides — a 1974 prank by San Francisco art collective Ant Farm, bankrolled by eccentric Amarillo millionaire Stanley Marsh 3. Spray-painting them isn't vandalism; it's the exhibit.","see":["Your own layer: the cars wear thousands of coats — paint has measurably thickened them by centimetres; whatever you paint will be gone under someone else's by tomorrow, which is the artwork's actual point","Tailfin evolution, still legible under the paint: the '49 has none, the '59 has the biggest fins ever made"],"tips":["Any hardware store or the on-site vending sells cans (~$5–8); bring one per person + one to gift a family that forgot","Sunset light (~8:45pm CDT) sets the field glowing — golden hour here is the photo","It's a 300-m walk into the field from the frontage road gate; take your empties out","Wind advisory: paint downwind of your own shirt"],"fact":"Marsh's instruction to Ant Farm was that the art should 'baffle the locals.' Instead the locals adopted it so completely that when the cars were once repainted a uniform color for a documentary, Amarillans had them re-graffitied within 24 hours.","map":{"caption":"Through the turnstile, 300 m straight into the field. Shoot from the east side at sunset so the low light rims the fins; paint with the wind at your back.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><circle cx='40' cy='72' r='12' fill='#F5C518'/><text x='22' y='98' font-size='9.5' fill='#8A6D00'>sunset ▸ west<\/text><line x1='104' y1='112' x2='120' y2='82' stroke='#697077' stroke-width='5' stroke-linecap='round'/><line x1='128' y1='112' x2='144' y2='82' stroke='#697077' stroke-width='5' stroke-linecap='round'/><line x1='152' y1='112' x2='168' y2='82' stroke='#697077' stroke-width='5' stroke-linecap='round'/><line x1='176' y1='112' x2='192' y2='82' stroke='#697077' stroke-width='5' stroke-linecap='round'/><line x1='200' y1='112' x2='216' y2='82' stroke='#697077' stroke-width='5' stroke-linecap='round'/><line x1='224' y1='112' x2='240' y2='82' stroke='#697077' stroke-width='5' stroke-linecap='round'/><text x='96' y='66' font-size='9.5' fill='#5A6068'>10 Cadillacs · oldest (west) → newest (east)<\/text><text x='258' y='104' font-size='14'>📷<\/text><text x='236' y='126' font-size='10' fill='#22262A' font-weight='700'>shoot from the east<\/text><text x='250' y='138' font-size='9' fill='#5A6068'>backlit fins<\/text><path d='M172,118 V196' stroke='#D69500' stroke-width='3' stroke-dasharray='7 5'/><text x='184' y='162' font-size='10' fill='#8A6D00'>300 m walk<\/text><circle cx='172' cy='200' r='5' fill='#fff' stroke='#23272B' stroke-width='2'/><text x='184' y='205' font-size='9.5' fill='#22262A'>turnstile gate<\/text><path d='M10,216 H330' stroke='#697077' stroke-width='6'/><text x='16' y='234' font-size='9.5' fill='#5A6068'>frontage rd (park on the shoulder) · I-40 beyond<\/text><text x='226' y='182' font-size='9.5' fill='#B01E24' font-weight='700'>⚠ paint downwind<\/text><text x='40' y='196' font-size='9.5' fill='#00693C'>bring cans · take empties<\/text><\/svg>"}}},{"name":"The Big Texan, Amarillo","lat":35.1922,"lng":-101.7549,"when":"dinner","note":"72oz steak challenge spectating","guide":{"what":"The Big Texan (1960) is the Route 66 steakhouse that moved to I-40 when the road died and got bigger: home of the 72 oz steak challenge — eat a 2 kg top sirloin plus shrimp cocktail, baked potato, salad and roll in 60 minutes and it's free. About 1 in 6 finish. You're here to eat a reasonable steak and watch someone attempt an unreasonable one.","see":["Challengers eat on a raised stage under a countdown clock — the house announces attempts; cheer accordingly","The Hall of Fame photos: record holder Molly Schuyler ate THREE in 20 minutes total, a fact that will haunt you","Peak Texas décor: longhorn everything, shooting gallery, in-house brewery (the beers are legitimately good)"],"tips":["Free limo with steer horns shuttles from area hotels — call them; it's the correct way to arrive","No reservation needed for normal tables; the wait moves fast","The 8–12 oz cuts are good honest steak; the challenge steak is, by all survivor accounts, not the kitchen's best work"],"fact":"The challenge began when founder Bob Lee watched a cowboy demolish a pound of steak and keep ordering; the one-hour, free-if-finished format is unchanged since 1962, and attempts run nightly."}}],"stay":{"place":"Amarillo","cost":"~$100","lat":35.193,"lng":-101.831},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Santa+Fe%2C+NM&destination=Amarillo%2C+TX&waypoints=Cadillac+Ranch"},{"n":20,"date":"2026-07-24","title":"Amarillo → Oklahoma City","tz":"America/Chicago","mi":260,"mapLabel":"OKC","drive":"~260 mi · 3.75 h","rest":"Easy day","leaveBy":"9:30","leaveNote":"Easy 260 mi — sleep in.","costs":{"stay":110,"food":70,"fuel":49},"desc":"The U-Drop Inn is the Cars building you haven't seen yet, right on I-40. Then a relaxed OKC afternoon and Oklahoma's famous onion burgers.","stops":[{"name":"U-Drop Inn, Shamrock TX","lat":35.2137,"lng":-100.249,"dur":"20 min","note":"1936 art-deco Conoco — Ramone's body shop in Cars","guide":{"what":"The U-Drop Inn (1936) is Art Deco gone wonderfully feral in a town of 1,800: a glazed-tile Conoco station and café crowned with a neon-ringed tulip spire, built from a design its architect reportedly scratched into the dirt with a nail. Pixar drew it, nearly line-for-line, as Ramone's body shop in Cars.","see":["The tower and the restored neon (lit at dusk — you're here midday, the tile is the show)","Inside: it's now Shamrock's visitor center and gift shop with the old café booths preserved; free, staffed by the friendliest retirees in Texas","There's a Tesla supercharger row behind it — the old road refueling the new one"],"tips":["20 minutes, right off I-40 exit 163","They'll stamp a Route 66 'passport' if you've picked one up anywhere; kids-menu-level joy, fully allowed for adults"],"fact":"When it opened, the U-Drop was 'the swankiest of swank eating places' per the local paper, with the nearest neon competition 160 km away. Its 2003 restoration cost 40× the original build price, and the town threw a parade."}},{"name":"OKC National Memorial","lat":35.473,"lng":-97.5171,"dur":"~1 h","note":"Moving — allow an hour","guide":{"what":"On April 19, 1995, a truck bomb destroyed the Murrah Federal Building and killed 168 people, including 19 children — the deadliest domestic terror attack in US history. The memorial that replaced it is one of the most effective in the world: 168 empty bronze chairs on the footprint, small chairs for the children, framed by twin gates stamped 9:01 and 9:03 — the minutes before and after.","see":["The Field of Empty Chairs at the reflecting pool — each lit from within at night; the 19 small chairs stop everyone","The Survivor Tree: an American elm that took the blast at 40 m and lived; its saplings are planted at Sandy Hook, at the Boston Marathon finish, everywhere grief needs a tree","The Fence: a section of the original chain-link where people still leave tokens, 30 years on"],"tips":["The outdoor memorial is free and open 24/7; ~45 min is right, and quiet is the local custom","The museum ($) is excellent but heavy — with your schedule, the grounds alone are the visit","It's a 5-min walk from Bricktown — do this first, dinner after"],"fact":"The Survivor Tree was nearly cut down for evidence — bomb fragments were embedded in its trunk. Arborists fought for it, and its annual seed harvest is now distributed to the public; the memorial's design contract legally requires its protection forever.","map":{"caption":"The gates frame the minute of the blast: walk in through 9:01, out through 9:03. Chairs face the pool; the Survivor Tree watches from the terrace above.","svg":"<svg viewBox='0 0 340 240' xmlns='http://www.w3.org/2000/svg'><circle cx='170' cy='58' r='16' fill='#7FA96B'/><rect x='167' y='70' width='6' height='12' fill='#8B6F47'/><text x='192' y='56' font-size='10.5' fill='#22262A' font-weight='700'>⭐ Survivor Tree<\/text><text x='192' y='68' font-size='9' fill='#5A6068'>1995 blast survivor — terrace above<\/text><rect x='84' y='96' width='14' height='48' fill='#C9A227'/><text x='78' y='88' font-size='11' fill='#22262A' font-weight='700'>9:01<\/text><rect x='242' y='96' width='14' height='48' fill='#C9A227'/><text x='238' y='88' font-size='11' fill='#22262A' font-weight='700'>9:03<\/text><rect x='102' y='108' width='136' height='24' fill='#CFE3F2' stroke='#8FB8D8' stroke-width='1.5'/><text x='134' y='124' font-size='9.5' fill='#5A6068'>reflecting pool<\/text><g fill='#B98A56'><rect x='118' y='156' width='7' height='7'/><rect x='134' y='156' width='7' height='7'/><rect x='150' y='156' width='7' height='7'/><rect x='166' y='156' width='7' height='7'/><rect x='182' y='156' width='7' height='7'/><rect x='198' y='156' width='7' height='7'/><rect x='120' y='172' width='5' height='5'/><rect x='136' y='172' width='7' height='7'/><rect x='152' y='172' width='7' height='7'/><rect x='168' y='172' width='5' height='5'/><rect x='184' y='172' width='7' height='7'/><rect x='200' y='172' width='7' height='7'/><\/g><text x='104' y='198' font-size='10' fill='#22262A'>Field of Empty Chairs — 168, 19 small<\/text><path d='M62,96 V148' stroke='#697077' stroke-width='2' stroke-dasharray='3 4'/><text x='14' y='120' font-size='9.5' fill='#5A6068'>the Fence —<\/text><text x='14' y='131' font-size='9.5' fill='#5A6068'>leave a token<\/text><rect x='252' y='42' width='58' height='20' rx='2' fill='#fff' stroke='#23272B' stroke-width='1.5'/><text x='258' y='56' font-size='9' fill='#22262A'>museum ($)<\/text><text x='96' y='226' font-size='10' fill='#5A6068'>free · open 24/7 · lit chairs after dark · quiet<\/text><\/svg>"}}},{"name":"Bricktown canal walk","lat":35.4661,"lng":-97.5089,"when":"evening","dur":"~2 h","note":"Onion burgers","guide":{"what":"Oklahoma City's old warehouse district, dead by 1970, was reborn around a canal nobody needed and everybody loves — water taxis loop past patios below street level. Tonight's actual mission is Oklahoma's great gift to cuisine: the onion burger, born in nearby El Reno in the 1920s when Depression cooks smashed cheap onions into expensive beef to stretch it.","see":["The canal by water taxi or the free 20-min stroll of it","The Centennial Land Run Monument (east end): 45 larger-than-life bronze homesteaders mid-gallop — the 1889 land rush frozen at full chaos; weirdly great after dark","Flaming Lips Alley — the city named a street for its weirdest band"],"tips":["Onion burger targets: Tucker's Onion Burgers (temple of the form) or S&B's for the creative versions","Bricktown parking garages are cheap; the district is compact and walkable","This is an easy night — you've earned a slow one; tomorrow is short"],"fact":"The fried-onion burger was engineering: onions were a nickel a sack, beef wasn't. El Reno still holds a Fried Onion Burger Day festival, and purists insist the onions must cook IN the smash, not beside it."}}],"stay":{"place":"Oklahoma City","cost":"~$110","lat":35.4676,"lng":-97.5164},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Amarillo%2C+TX&destination=Oklahoma+City%2C+OK&waypoints=U-Drop+Inn%2C+Shamrock%2C+TX"},{"n":21,"date":"2026-07-25","title":"OKC → Branson, MO (Ozarks)","tz":"America/Chicago","mi":290,"drive":"~290 mi · 4.5 h","leaveBy":"9:00","leaveNote":"Blue Whale detour + Branson Landing evening.","costs":{"stay":130,"food":70,"fuel":55},"desc":"Into the green Ozark hills — suddenly the West is behind you. Route 66's goofiest landmark is 5 min off I-44 near Tulsa. Evening at Branson Landing on the lakefront; early night before the theme park.","stops":[{"name":"Blue Whale of Catoosa","lat":36.1878,"lng":-95.744,"dur":"20 min","note":"Route 66's goofiest landmark — 5 min off I-44","guide":{"what":"In 1972, Hugh Davis — a retired zoo director — secretly built an 24-metre smiling sperm whale in his pond as a 34th-anniversary gift for his wife Zelda, who collected whale figurines. Passing Route 66 traffic assumed it was an attraction, so the family added picnic tables and let everyone in. It remains the mother road's purest artifact: a giant thing built for love.","see":["The whale itself — walk into the smile, climb to the tail platforms; the blue concrete grin has been re-painted by volunteers for 50 years","The gift kiosk when staffed — proceeds keep Blue repainted; the caretakers know every inch of the story"],"tips":["20 minutes, free (donations welcome), picnic tables if you grabbed road snacks","5 min off I-44 at Catoosa — the detour is nothing, the photo is forever"],"fact":"Kids swam from the whale's dive platforms into the pond through the 1980s until insurance ended it. Zelda outlived Hugh and kept the whale; when paint faded in the 2000s, donations arrived from Route 66 clubs in Germany, Japan and Brazil."}},{"name":"Branson Landing","lat":36.6437,"lng":-93.2113,"when":"evening","note":"Lakefront stroll","guide":{"what":"Branson is Nashville's unhinged country cousin — a town of 12,000 with 100+ live theaters — and the Landing is its lakefront: 2.4 km of boardwalk on Lake Taneycomo, a reservoir so deep and cold it holds trophy trout in the Ozark summer.","see":["The fire-and-water fountain show at the center plaza — geysers, flames and music on the hour (evenings); unapologetically Vegas-lite and the kids next to you will lose their minds","The lake itself: Taneycomo's water comes from the bottom of an upstream dam at a constant 9°C — fog rolls off it on warm evenings like a horror film, beautifully"],"tips":["Dinner on any boardwalk patio; the White River Fish House is the local pick","Early night, seriously — tomorrow's park day rewards the 8:45 departure","If you ever return with more days: the $10 'Baldknobbers' or Presleys' shows are the authentic Branson experience, sequins and all"],"fact":"Branson's show industry started in 1959 with the Baldknobbers Jamboree — four brothers in a converted skating rink. The town now sells more theater seats per year than Broadway."}}],"stay":{"place":"Branson ×2 nights","cost":"~$130","lat":36.6437,"lng":-93.2185},"routeUrl":"https://www.google.com/maps/dir/?api=1&origin=Oklahoma+City%2C+OK&destination=Branson%2C+MO&waypoints=Blue+Whale+of+Catoosa"},{"n":22,"date":"2026-07-26","title":"Silve
